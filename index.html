<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>

/* ===== BASE STYLES ===== */
body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* ===== MENU SCREEN ===== */
#menu{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at center, #145a2a, #020502);
}

/* TITLE */
.title{
    font-size:90px;
    font-weight:900;
    letter-spacing:6px;
    text-align:center;

    color:#f7d774;

    -webkit-text-stroke:3px #5a3a00;

    text-shadow:
    0 5px 0 #7a4f00,
    0 10px 25px black,
    0 0 40px gold;
}

/* BUTTON */
button{
    margin-top:60px;
    width:320px;
    height:90px;

    font-size:32px;
    font-weight:bold;

    background:linear-gradient(45deg,#8b0000,#d4af37);
    color:white;

    border:3px solid gold;
    border-radius:18px;

    cursor:pointer;

    box-shadow:0 0 25px gold;
}

button:hover{
    transform:scale(1.05);
}

/* ===== GAME AREA ===== */
#game{
    display:none;
    height:100vh;
    background:#1c7a2f;
    position:relative;
}

canvas{
    display:block;
    margin:auto;
    background:#1c7a2f;
    border:4px solid white;
}

.ui{
    position:absolute;
    top:10px;
    left:10px;
    font-size:18px;
}

</style>
</head>

<body>

<!-- ===== MAIN MENU ===== -->
<div id="menu">

    <div class="title">
        DIAMOND<br>DYNASTY<br>BASEBALL
    </div>

    <button onclick="startGame()">SHOWCASE</button>

</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game">

    <div class="ui" id="ui"></div>

    <canvas id="c" width="900" height="500"></canvas>

</div>

<script>

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

let screen="menu";

/* =========================
   TEAMS (MLB STYLE CITIES)
========================= */

let teams=[
"New York Titans",
"Los Angeles Stars",
"Chicago Wind",
"Boston Liberty",
"Houston Comets",
"Miami Waves",
"San Francisco Gold",
"Atlanta Knights",
"Dallas Rangers",
"Seattle Storm",
"Philadelphia Forge",
"Detroit Steel"
];

let homeTeam="";
let awayTeam="";

/* =========================
   GAME STATE
========================= */

let game={
    score:0,
    strikes:0,
    outs:0,
    result:"Ready",
    ballActive:false
};

let ball={
    x:450,
    y:200,
    vx:0,
    vy:0,
    pitchType:"fastball"
};

/* =========================
   START FLOW → TEAM SELECT
========================= */

function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";

    screen="teamSelect";
    drawTeamSelect();
}

/* =========================
   TEAM SELECT SCREEN
========================= */

function drawTeamSelect(){

    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#0b3d1a";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("SELECT TEAMS",330,60);

    ctx.font="22px Arial";

    ctx.fillText("HOME: "+(homeTeam||"None"),40,120);
    ctx.fillText("AWAY: "+(awayTeam||"None"),40,160);

    ctx.fillText("1-6 = HOME TEAM",40,240);
    ctx.fillText("Q-Y = AWAY TEAM",40,280);
    ctx.fillText("ENTER = START GAME",40,320);

    for(let i=0;i<teams.length;i++){
        ctx.fillText((i+1)+"  "+teams[i],500,120+(i*28));
    }
}

/* =========================
   INPUT SYSTEM
========================= */

document.addEventListener("keydown",(e)=>{

    if(screen==="teamSelect"){

        // HOME
        if(e.key==="1") homeTeam=teams[0];
        if(e.key==="2") homeTeam=teams[1];
        if(e.key==="3") homeTeam=teams[2];
        if(e.key==="4") homeTeam=teams[3];
        if(e.key==="5") homeTeam=teams[4];
        if(e.key==="6") homeTeam=teams[5];

        // AWAY
        if(e.key.toLowerCase()==="q") awayTeam=teams[6];
        if(e.key.toLowerCase()==="w") awayTeam=teams[7];
        if(e.key.toLowerCase()==="e") awayTeam=teams[8];
        if(e.key.toLowerCase()==="r") awayTeam=teams[9];
        if(e.key.toLowerCase()==="t") awayTeam=teams[10];
        if(e.key.toLowerCase()==="y") awayTeam=teams[11];

        if(e.key==="Enter" && homeTeam && awayTeam){
            screen="game";
            loop();
        }

        drawTeamSelect();
    }

    if(e.code==="Space"){
        swing();
    }

});

/* =========================
   FIELD
========================= */

function drawField(){

    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#1c7a2f";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="#caa472";
    ctx.beginPath();
    ctx.moveTo(450,420);
    ctx.lineTo(600,260);
    ctx.lineTo(450,120);
    ctx.lineTo(300,260);
    ctx.closePath();
    ctx.fill();
}

/* =========================
   BALL
========================= */

function drawBall(){
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,6,0,Math.PI*2);
    ctx.fill();
}

/* =========================
   PITCH
========================= */

function pitch(){

    if(game.ballActive) return;

    let types=["fastball","curveball","slider","changeup"];
    ball.pitchType=types[Math.floor(Math.random()*types.length)];

    game.ballActive=true;

    ball.x=450;
    ball.y=200;

    ball.vx=(Math.random()-0.5)*6;
    ball.vy=4;

    game.result=ball.pitchType;
}

/* =========================
   SWING
========================= */

function swing(){

    if(!game.ballActive) return;

    let dist=Math.abs(ball.y-380);

    if(dist<15){
        game.score+=2;
        game.result="HIT";
    }
    else if(dist<30){
        game.score+=1;
        game.result="CONTACT";
    }
    else{
        game.strikes++;
        game.result="MISS";

        if(game.strikes>=3){
            game.outs++;
            game.strikes=0;
        }
    }

    game.ballActive=false;
}

/* =========================
   UPDATE
========================= */

function update(){

    if(game.ballActive){
        ball.x+=ball.vx;
        ball.y+=ball.vy;

        if(ball.y>500){
            game.ballActive=false;
            game.strikes++;

            if(game.strikes>=3){
                game.outs++;
                game.strikes=0;
            }
        }
    }
}

/* =========================
   UI
========================= */

function ui(){

    document.getElementById("ui").innerHTML=
    "HOME: "+homeTeam+
    "<br>AWAY: "+awayTeam+
    "<br>Score: "+game.score+
    "<br>Strikes: "+game.strikes+
    "<br>Outs: "+game.outs+
    "<br>"+game.result;
}

/* =========================
   LOOP
========================= */

function loop(){

    drawField();
    update();

    if(game.ballActive) drawBall();

    ui();

    if(screen==="game"){
        requestAnimationFrame(loop);
    }
}

</script>

</body>
</html>
