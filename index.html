<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>

body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* ===== MENU ===== */
#menu{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#0b3d1a,#020502);
}

.title{
    font-size:100px;
    font-weight:900;
    letter-spacing:6px;
    text-align:center;

    background:linear-gradient(90deg,#ffcc00,#ff4d4d,#4dd2ff,#7cff4d,#ffcc00);
    background-size:300% 300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 25px rgba(255,255,255,0.15);
}

/* BUTTON */
button{
    margin-top:60px;
    width:340px;
    height:95px;
    font-size:34px;
    font-weight:bold;

    background:linear-gradient(45deg,#8b0000,#d4af37);
    color:white;

    border:none;
    border-radius:20px;

    cursor:pointer;
    box-shadow:0 0 30px gold;
}

button:hover{
    transform:scale(1.08);
}

/* ===== GAME ===== */
#game{
    display:none;
    height:100vh;
    background:#1c7a2f;
}

/* ===== FANCY FLOATING TEAM SELECT ===== */

.centerTitle{
    position:absolute;
    top:45px;
    width:100%;
    text-align:center;

    font-size:50px;
    font-weight:900;
    letter-spacing:6px;

    background:linear-gradient(90deg,#ffd700,#ff4d4d,#4dd2ff,#7cff4d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* SIDE LABELS */
.sideLabel{
    position:absolute;
    top:170px;
    font-size:36px;
    font-weight:900;
    letter-spacing:5px;

    background:linear-gradient(90deg,#ffd700,#4dd2ff,#ff4d4d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 20px black;
}

#homeLabel{ left:120px; }
#awayLabel{ right:120px; }

/* TEAM TEXT (NO BOXES, JUST FLOATING NAME) */
.teamName{
    position:absolute;
    top:260px;
    font-size:40px;
    font-weight:900;
    letter-spacing:2px;
    text-align:center;
    width:320px;

    background:linear-gradient(90deg,#ffcc00,#ff0066,#00ccff,#7cff4d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 25px rgba(0,0,0,0.7);
}

#homeTeamText{ left:40px; }
#awayTeamText{ right:40px; }

/* ARROWS (FLOATING ONLY, NO BOX FEEL) */
.arrow{
    position:absolute;
    top:270px;
    font-size:70px;
    cursor:pointer;
    user-select:none;

    color:gold;
    text-shadow:0 0 25px black;
    transition:0.2s;
}

.arrow:hover{
    transform:scale(1.3);
    color:white;
}

#homeLeft{ left:10px; }
#homeRight{ left:380px; }

#awayLeft{ right:380px; }
#awayRight{ right:10px; }

/* INSTRUCTION TEXT */
.instruction{
    position:absolute;
    bottom:35px;
    width:100%;
    text-align:center;

    font-size:18px;
    letter-spacing:3px;

    background:linear-gradient(90deg,#ffffff,#ffd700,#4dd2ff,#ff4d4d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

canvas{
    display:block;
    margin:auto;
    background:#1c7a2f;
}

.ui{
    position:absolute;
    top:10px;
    left:10px;
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu">

    <div class="title">
        DIAMOND<br>DYNASTY<br>BASEBALL
    </div>

    <button onclick="startGame()">SHOWCASE</button>

</div>

<!-- GAME -->
<div id="game">

    <div class="centerTitle">SELECT TEAMS</div>

    <div class="sideLabel" id="homeLabel">HOME</div>
    <div class="sideLabel" id="awayLabel">AWAY</div>

    <div class="teamName" id="homeTeamText"></div>
    <div class="teamName" id="awayTeamText"></div>

    <div class="arrow" id="homeLeft" onclick="changeHome(-1)">⬅</div>
    <div class="arrow" id="homeRight" onclick="changeHome(1)">➡</div>

    <div class="arrow" id="awayLeft" onclick="changeAway(-1)">⬅</div>
    <div class="arrow" id="awayRight" onclick="changeAway(1)">➡</div>

    <div class="instruction">
        A/D = HOME • J/L = AWAY • ENTER = START GAME
    </div>

    <canvas id="c" width="900" height="500"></canvas>

    <div class="ui" id="ui"></div>

</div>

<script>

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

let screen="menu";

let teams=[
"New York Titans",
"Los Angeles Stars",
"Chicago Wind",
"Boston Liberty",
"Houston Comets",
"Miami Waves",
"San Francisco Gold",
"Atlanta Knights",
"Dallas Rangers",
"Seattle Storm",
"Philadelphia Forge",
"Detroit Steel"
];

let homeIndex=0;
let awayIndex=1;

let homeTeam="";
let awayTeam="";

let game={
    score:0,
    strikes:0,
    outs:0,
    result:"Ready",
    ballActive:false
};

let ball={
    x:450,
    y:200,
    vx:0,
    vy:0
};

function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";

    screen="teamSelect";
    updateUI();
}

function updateUI(){
    document.getElementById("homeTeamText").innerHTML=teams[homeIndex];
    document.getElementById("awayTeamText").innerHTML=teams[awayIndex];
}

function changeHome(dir){
    homeIndex+=dir;
    if(homeIndex<0) homeIndex=teams.length-1;
    if(homeIndex>=teams.length) homeIndex=0;
    updateUI();
}

function changeAway(dir){
    awayIndex+=dir;
    if(awayIndex<0) awayIndex=teams.length-1;
    if(awayIndex>=teams.length) awayIndex=0;
    updateUI();
}

document.addEventListener("keydown",(e)=>{

    if(screen==="teamSelect"){

        if(e.key==="a") changeHome(-1);
        if(e.key==="d") changeHome(1);

        if(e.key==="j") changeAway(-1);
        if(e.key==="l") changeAway(1);

        if(e.key==="Enter"){
            homeTeam=teams[homeIndex];
            awayTeam=teams[awayIndex];
            screen="game";
            loop();
        }
    }

    if(e.code==="Space"){
        swing();
    }
});

function drawField(){
    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#1c7a2f";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="#caa472";
    ctx.beginPath();
    ctx.moveTo(450,420);
    ctx.lineTo(600,260);
    ctx.lineTo(450,120);
    ctx.lineTo(300,260);
    ctx.closePath();
    ctx.fill();
}

function drawBall(){
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,6,0,Math.PI*2);
    ctx.fill();
}

function update(){
    if(game.ballActive){
        ball.x+=ball.vx;
        ball.y+=ball.vy;

        if(ball.y>500){
            game.ballActive=false;
            game.strikes++;
        }
    }
}

function swing(){
    if(!game.ballActive) return;

    let dist=Math.abs(ball.y-380);

    if(dist<25){
        game.score++;
        game.result="HIT";
    }else{
        game.strikes++;
        game.result="MISS";
    }

    game.ballActive=false;
}

function ui(){
    document.getElementById("ui").innerHTML=
    "HOME: "+homeTeam+
    "<br>AWAY: "+awayTeam+
    "<br>Score: "+game.score+
    "<br>Strikes: "+game.strikes+
    "<br>"+game.result;
}

function loop(){
    drawField();
    update();
    if(game.ballActive) drawBall();
    ui();

    if(screen==="game"){
        requestAnimationFrame(loop);
    }
}

</script>

</body>
</html>
