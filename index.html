<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>

body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* ===== MENU ===== */
#menu{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:radial-gradient(circle at center,#145a2a,#020502);
}

.title{
    font-size:90px;
    font-weight:900;
    letter-spacing:6px;
    text-align:center;
    color:#f7d774;
    -webkit-text-stroke:3px #5a3a00;
    text-shadow:0 5px 0 #7a4f00,0 10px 25px black,0 0 40px gold;
}

button{
    margin-top:60px;
    width:320px;
    height:90px;
    font-size:32px;
    font-weight:bold;
    background:linear-gradient(45deg,#8b0000,#d4af37);
    color:white;
    border:3px solid gold;
    border-radius:18px;
    cursor:pointer;
    box-shadow:0 0 25px gold;
}

/* ===== GAME ===== */
#game{
    display:none;
    height:100vh;
    background:#1c7a2f;
}

canvas{
    display:block;
    margin:auto;
    background:#1c7a2f;
    border:4px solid white;
}

.ui{
    position:absolute;
    top:10px;
    left:10px;
}

/* ===== TEAM SELECT LAYOUT ===== */
#gameWrap{
    position:relative;
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu">

    <div class="title">
        DIAMOND<br>DYNASTY<br>BASEBALL
    </div>

    <button onclick="startGame()">SHOWCASE</button>

</div>

<!-- GAME -->
<div id="game">

    <div class="ui" id="ui"></div>
    <canvas id="c" width="900" height="500"></canvas>

</div>

<script>

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

let screen="menu";

/* =========================
   TEAMS
========================= */

let teams=[
"New York Titans",
"Los Angeles Stars",
"Chicago Wind",
"Boston Liberty",
"Houston Comets",
"Miami Waves",
"San Francisco Gold",
"Atlanta Knights",
"Dallas Rangers",
"Seattle Storm",
"Philadelphia Forge",
"Detroit Steel"
];

let homeIndex=0;
let awayIndex=1;

let homeTeam="";
let awayTeam="";

/* =========================
   GAME
========================= */

let game={
    score:0,
    strikes:0,
    outs:0,
    result:"Ready",
    ballActive:false
};

let ball={
    x:450,
    y:200,
    vx:0,
    vy:0
};

/* =========================
   START
========================= */

function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";

    screen="teamSelect";
    drawTeamSelect();
}

/* =========================
   TEAM SELECT (MLB STYLE SPLIT)
========================= */

function drawTeamSelect(){

    ctx.clearRect(0,0,900,500);

    /* background split */
    ctx.fillStyle="#0b3d1a";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="#ffffff";
    ctx.font="35px Arial";
    ctx.fillText("HOME",150,60);
    ctx.fillText("AWAY",650,60);

    /* LEFT SIDE (HOME) */
    ctx.font="28px Arial";

    ctx.fillStyle="gold";
    ctx.fillText("◀",100,220);
    ctx.fillText("▶",280,220);

    ctx.fillStyle="white";
    ctx.fillText(teams[homeIndex],120,220);

    /* RIGHT SIDE (AWAY) */
    ctx.fillStyle="gold";
    ctx.fillText("◀",600,220);
    ctx.fillText("▶",780,220);

    ctx.fillStyle="white";
    ctx.fillText(teams[awayIndex],620,220);

    /* instructions */
    ctx.font="20px Arial";
    ctx.fillText("A/D = HOME team",100,350);
    ctx.fillText("J/L = AWAY team",550,350);
    ctx.fillText("ENTER = START",350,420);
}

/* =========================
   INPUT (ARROW STYLE)
========================= */

document.addEventListener("keydown",(e)=>{

    if(screen==="teamSelect"){

        /* HOME LEFT/RIGHT */
        if(e.key==="a" || e.key==="ArrowLeft"){
            homeIndex--;
            if(homeIndex<0) homeIndex=teams.length-1;
        }

        if(e.key==="d" || e.key==="ArrowRight"){
            homeIndex++;
            if(homeIndex>=teams.length) homeIndex=0;
        }

        /* AWAY LEFT/RIGHT */
        if(e.key==="j"){
            awayIndex--;
            if(awayIndex<0) awayIndex=teams.length-1;
        }

        if(e.key==="l"){
            awayIndex++;
            if(awayIndex>=teams.length) awayIndex=0;
        }

        if(e.key==="Enter"){
            homeTeam=teams[homeIndex];
            awayTeam=teams[awayIndex];
            screen="game";
            loop();
        }

        drawTeamSelect();
    }

    if(e.code==="Space"){
        swing();
    }

});

/* =========================
   FIELD
========================= */

function drawField(){

    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#1c7a2f";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="#caa472";
    ctx.beginPath();
    ctx.moveTo(450,420);
    ctx.lineTo(600,260);
    ctx.lineTo(450,120);
    ctx.lineTo(300,260);
    ctx.closePath();
    ctx.fill();
}

/* =========================
   BALL
========================= */

function drawBall(){
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,6,0,Math.PI*2);
    ctx.fill();
}

/* =========================
   UPDATE
========================= */

function update(){

    if(game.ballActive){
        ball.x+=ball.vx;
        ball.y+=ball.vy;

        if(ball.y>500){
            game.ballActive=false;
            game.strikes++;
        }
    }
}

/* =========================
   SWING
========================= */

function swing(){

    if(!game.ballActive) return;

    let dist=Math.abs(ball.y-380);

    if(dist<25){
        game.score++;
        game.result="HIT";
    }else{
        game.strikes++;
        game.result="MISS";
    }

    game.ballActive=false;
}

/* =========================
   UI
========================= */

function ui(){

    document.getElementById("ui").innerHTML=
    "HOME: "+homeTeam+
    "<br>AWAY: "+awayTeam+
    "<br>Score: "+game.score+
    "<br>Strikes: "+game.strikes+
    "<br>"+game.result;
}

/* =========================
   LOOP
========================= */

function loop(){

    drawField();
    update();

    if(game.ballActive) drawBall();

    ui();

    if(screen==="game"){
        requestAnimationFrame(loop);
    }
}

</script>

</body>
</html>
