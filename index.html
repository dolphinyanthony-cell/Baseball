<h1 style="color:red;">TEST UPDATE</h1>
<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>

body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    background:#0f2f1c;
    color:white;
}

/* MENU */
#menu{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#0f2f1c,#050807);
}

.title{
    font-size:92px;
    font-weight:900;
    letter-spacing:6px;
    text-align:center;
    color:#d6c27a;
    text-shadow:0 2px 0 #000,0 10px 30px rgba(0,0,0,0.8);
}

button{
    margin-top:60px;
    width:320px;
    height:85px;
    font-size:30px;
    font-weight:bold;
    background:linear-gradient(45deg,#5a0f0f,#b08d2a);
    color:white;
    border:none;
    border-radius:14px;
    cursor:pointer;
}

/* TEAM SELECT */
.centerTitle{
    position:absolute;
    top:55px;
    width:100%;
    text-align:center;
    font-size:44px;
    font-weight:800;
    letter-spacing:5px;
    color:#e6d8a8;
}

.sideLabel{
    position:absolute;
    top:180px;
    font-size:30px;
    font-weight:700;
    color:#d6c27a;
}

#homeLabel{ left:140px; }
#awayLabel{ right:140px; }

.teamName{
    position:absolute;
    top:265px;
    font-size:34px;
    font-weight:800;
    width:320px;
    text-align:center;
    color:#f5f1e3;
}

#homeTeamText{ left:40px; }
#awayTeamText{ right:40px; }

.arrow{
    position:absolute;
    top:270px;
    font-size:60px;
    cursor:pointer;
    user-select:none;
    color:#d6c27a;
}

#homeLeft{ left:20px; }
#homeRight{ left:380px; }

#awayLeft{ right:380px; }
#awayRight{ right:20px; }

.instruction{
    position:absolute;
    bottom:35px;
    width:100%;
    text-align:center;
    font-size:16px;
    color:#cfc6a4;
}

</style>
</head>

<body>

<div id="menu">

    <div class="title">
        DIAMOND DYNASTY<br>BASEBALL
    </div>

    <button onclick="startGame()">SHOWCASE</button>

</div>

<div id="select" style="display:none;">

    <div class="centerTitle">SELECT TEAMS</div>

    <div class="sideLabel" id="homeLabel">HOME</div>
    <div class="sideLabel" id="awayLabel">AWAY</div>

    <div class="teamName" id="homeTeamText"></div>
    <div class="teamName" id="awayTeamText"></div>

    <div class="arrow" id="homeLeft" onclick="changeHome(-1)">‹</div>
    <div class="arrow" id="homeRight" onclick="changeHome(1)">›</div>

    <div class="arrow" id="awayLeft" onclick="changeAway(-1)">‹</div>
    <div class="arrow" id="awayRight" onclick="changeAway(1)">›</div>

    <div class="instruction">
        A/D = Home • J/L = Away • ENTER = Start Game
    </div>

</div>

<script>

let teams=[
"New York Titans",
"Los Angeles Stars",
"Chicago Wind",
"Boston Liberty",
"Houston Comets",
"Miami Waves",
"San Francisco Gold",
"Atlanta Knights",
"Dallas Rangers",
"Seattle Storm",
"Philadelphia Forge",
"Detroit Steel"
];

let homeIndex=0;
let awayIndex=1;

function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("select").style.display="block";
    updateUI();
}

function updateUI(){
    document.getElementById("homeTeamText").innerHTML=teams[homeIndex];
    document.getElementById("awayTeamText").innerHTML=teams[awayIndex];
}

function changeHome(d){
    homeIndex=(homeIndex+d+teams.length)%teams.length;
    updateUI();
}

function changeAway(d){
    awayIndex=(awayIndex+d+teams.length)%teams.length;
    updateUI();
}

document.addEventListener("keydown",(e)=>{

    if(e.key==="a") changeHome(-1);
    if(e.key==="d") changeHome(1);

    if(e.key==="j") changeAway(-1);
    if(e.key==="l") changeAway(1);

    if(e.key==="Enter"){
        localStorage.setItem("homeTeam",teams[homeIndex]);
        localStorage.setItem("awayTeam",teams[awayIndex]);
        window.location.href="game.html";
    }

});

</script>

</body>
</html>
