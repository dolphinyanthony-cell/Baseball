<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>

body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* ===== MENU ===== */
#menu{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#145a2a,#020502);
}

.title{
    font-size:90px;
    font-weight:900;
    letter-spacing:6px;
    text-align:center;
    color:#f7d774;
    -webkit-text-stroke:3px #5a3a00;
    text-shadow:0 5px 0 #7a4f00,0 10px 25px black,0 0 40px gold;
}

button{
    margin-top:60px;
    width:320px;
    height:90px;
    font-size:32px;
    font-weight:bold;
    background:linear-gradient(45deg,#8b0000,#d4af37);
    color:white;
    border:3px solid gold;
    border-radius:18px;
    cursor:pointer;
    box-shadow:0 0 25px gold;
}

button:hover{
    transform:scale(1.05);
}

/* ===== GAME ===== */
#game{
    display:none;
    height:100vh;
    background:#1c7a2f;
}

canvas{
    display:block;
    margin:auto;
    background:#1c7a2f;
    border:4px solid white;
}

.ui{
    position:absolute;
    top:10px;
    left:10px;
}

/* ===== CLEAN TEAM SELECT UI ===== */

.team-title{
    font-size:42px;
    text-align:center;
    position:absolute;
    top:40px;
    width:100%;
    font-weight:bold;
    letter-spacing:3px;
    color:white;
    text-shadow:0 4px 10px black;
}

.team-box{
    position:absolute;
    width:350px;
    height:220px;
    top:160px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.25);
    border:2px solid rgba(255,255,255,0.4);
    border-radius:15px;
}

#homeBox{ left:80px; }
#awayBox{ right:80px; }

.arrow{
    position:absolute;
    font-size:40px;
    cursor:pointer;
    user-select:none;
    color:gold;
    text-shadow:0 0 10px black;
}

#homeLeft{ left:20px; top:250px; }
#homeRight{ left:420px; top:250px; }

#awayLeft{ right:420px; top:250px; }
#awayRight{ right:20px; top:250px; }

.instruction{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:18px;
    opacity:0.9;
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu">

    <div class="title">
        DIAMOND<br>DYNASTY<br>BASEBALL
    </div>

    <button onclick="startGame()">SHOWCASE</button>

</div>

<!-- GAME -->
<div id="game">

    <!-- TEAM SELECT UI -->
    <div class="team-title">SELECT TEAMS</div>

    <div id="homeBox" class="team-box"></div>
    <div id="awayBox" class="team-box"></div>

    <!-- ARROWS (moved so they don't block text) -->
    <div id="homeLeft" class="arrow" onclick="changeHome(-1)">⬅</div>
    <div id="homeRight" class="arrow" onclick="changeHome(1)">➡</div>

    <div id="awayLeft" class="arrow" onclick="changeAway(-1)">⬅</div>
    <div id="awayRight" class="arrow" onclick="changeAway(1)">➡</div>

    <div class="instruction">
        Click arrows or use A/D for Home • J/L for Away • ENTER to start
    </div>

    <canvas id="c" width="900" height="500"></canvas>

    <div class="ui" id="ui"></div>

</div>

<script>

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

let screen="menu";

/* ===== TEAMS ===== */
let teams=[
"New York Titans",
"Los Angeles Stars",
"Chicago Wind",
"Boston Liberty",
"Houston Comets",
"Miami Waves",
"San Francisco Gold",
"Atlanta Knights",
"Dallas Rangers",
"Seattle Storm",
"Philadelphia Forge",
"Detroit Steel"
];

let homeIndex=0;
let awayIndex=1;

let homeTeam="";
let awayTeam="";

/* ===== GAME ===== */
let game={
    score:0,
    strikes:0,
    outs:0,
    result:"Ready",
    ballActive:false
};

let ball={
    x:450,
    y:200,
    vx:0,
    vy:0
};

/* =========================
   START
========================= */

function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";

    screen="teamSelect";
    updateTeamUI();
}

/* =========================
   TEAM UI UPDATE
========================= */

function updateTeamUI(){

    document.getElementById("homeBox").innerHTML=
    "HOME<br><br>"+teams[homeIndex];

    document.getElementById("awayBox").innerHTML=
    "AWAY<br><br>"+teams[awayIndex];
}

/* =========================
   ARROW CONTROLS
========================= */

function changeHome(dir){
    homeIndex+=dir;
    if(homeIndex<0) homeIndex=teams.length-1;
    if(homeIndex>=teams.length) homeIndex=0;
    updateTeamUI();
}

function changeAway(dir){
    awayIndex+=dir;
    if(awayIndex<0) awayIndex=teams.length-1;
    if(awayIndex>=teams.length) awayIndex=0;
    updateTeamUI();
}

/* =========================
   KEYBOARD
========================= */

document.addEventListener("keydown",(e)=>{

    if(screen==="teamSelect"){

        if(e.key==="a") changeHome(-1);
        if(e.key==="d") changeHome(1);

        if(e.key==="j") changeAway(-1);
        if(e.key==="l") changeAway(1);

        if(e.key==="Enter"){
            homeTeam=teams[homeIndex];
            awayTeam=teams[awayIndex];
            screen="game";
            loop();
        }
    }

    if(e.code==="Space"){
        swing();
    }
});

/* =========================
   FIELD
========================= */

function drawField(){
    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#1c7a2f";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="#caa472";
    ctx.beginPath();
    ctx.moveTo(450,420);
    ctx.lineTo(600,260);
    ctx.lineTo(450,120);
    ctx.lineTo(300,260);
    ctx.closePath();
    ctx.fill();
}

/* =========================
   BALL
========================= */

function drawBall(){
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,6,0,Math.PI*2);
    ctx.fill();
}

/* =========================
   UPDATE
========================= */

function update(){
    if(game.ballActive){
        ball.x+=ball.vx;
        ball.y+=ball.vy;

        if(ball.y>500){
            game.ballActive=false;
            game.strikes++;
        }
    }
}

/* =========================
   SWING
========================= */

function swing(){
    if(!game.ballActive) return;

    let dist=Math.abs(ball.y-380);

    if(dist<25){
        game.score++;
        game.result="HIT";
    }else{
        game.strikes++;
        game.result="MISS";
    }

    game.ballActive=false;
}

/* =========================
   UI
========================= */

function ui(){
    document.getElementById("ui").innerHTML=
    "HOME: "+homeTeam+
    "<br>AWAY: "+awayTeam+
    "<br>Score: "+game.score+
    "<br>Strikes: "+game.strikes+
    "<br>"+game.result;
}

/* =========================
   LOOP
========================= */

function loop(){

    drawField();
    update();

    if(game.ballActive) drawBall();

    ui();

    if(screen==="game"){
        requestAnimationFrame(loop);
    }
}

</script>

</body>
</html>
