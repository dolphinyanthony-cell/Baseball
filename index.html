<script>

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

let screen="menu"; 
let subScreen="teamSelect";

let homeTeam="";
let awayTeam="";

let game={
    score:0,
    strikes:0,
    outs:0,
    balls:0,
    result:"Ready",
    ballActive:false
};

let ball={
    x:450,
    y:200,
    vx:0,
    vy:0,
    pitchType:"fastball"
};

/* =========================
   START BUTTON (NOW OPENS TEAM SELECT)
========================= */

function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";

    screen="teamSelect";

    drawTeamSelect();
}

/* =========================
   TEAM SELECT SCREEN
========================= */

let teams=[
"New York Comets",
"Los Angeles Titans",
"Chicago Blaze",
"Miami Sharks",
"Texas Outlaws",
"Boston Iron"
];

function drawTeamSelect(){

    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#0b3d1a";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("SELECT TEAMS",330,60);

    ctx.font="22px Arial";

    ctx.fillText("HOME TEAM: "+(homeTeam || "Not Selected"),50,120);
    ctx.fillText("AWAY TEAM: "+(awayTeam || "Not Selected"),50,160);

    ctx.fillText("Press 1-6 for HOME TEAM",50,230);
    ctx.fillText("Press Q-T for AWAY TEAM",50,270);

    ctx.fillText("Press ENTER to continue",50,350);

    for(let i=0;i<teams.length;i++){
        ctx.fillText((i+1)+" - "+teams[i],450,120+(i*30));
    }
}

/* =========================
   INPUT SYSTEM (TEAM SELECT ADDED)
========================= */

document.addEventListener("keydown",(e)=>{

    /* TEAM SELECT */
    if(screen==="teamSelect"){

        if(e.key==="1") homeTeam=teams[0];
        if(e.key==="2") homeTeam=teams[1];
        if(e.key==="3") homeTeam=teams[2];
        if(e.key==="4") homeTeam=teams[3];
        if(e.key==="5") homeTeam=teams[4];
        if(e.key==="6") homeTeam=teams[5];

        if(e.key.toLowerCase()==="q") awayTeam=teams[0];
        if(e.key.toLowerCase()==="w") awayTeam=teams[1];
        if(e.key.toLowerCase()==="e") awayTeam=teams[2];
        if(e.key.toLowerCase()==="r") awayTeam=teams[3];
        if(e.key.toLowerCase()==="t") awayTeam=teams[4];

        if(e.key==="Enter" && homeTeam && awayTeam){
            startShowcaseHub();
        }

        drawTeamSelect();
    }

    /* GAME CONTROLS */
    if(e.code==="Space"){
        swing();
    }

});

/* =========================
   SHOWCASE HUB
========================= */

function startShowcaseHub(){

    screen="showcase";

    drawShowcaseMenu();
}

function drawShowcaseMenu(){

    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#0b3d1a";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("SHOWCASE MODE",300,80);

    ctx.font="25px Arial";

    ctx.fillText("HOME: "+homeTeam,50,140);
    ctx.fillText("AWAY: "+awayTeam,50,180);

    ctx.fillText("1 - Play Game",50,260);
    ctx.fillText("2 - Home Run Derby",50,300);
    ctx.fillText("3 - Practice",50,340);
    ctx.fillText("B - Back",50,380);
}

/* =========================
   NAV BACK TO MENU
========================= */

function backToMenu(){
    document.getElementById("game").style.display="none";
    document.getElementById("menu").style.display="flex";
    screen="menu";
}

/* =========================
   GAME START
========================= */

function startMatch(){
    screen="gameplay";
    game.score=0;
    game.strikes=0;
    game.outs=0;
    loop();
}

/* =========================
   PITCH SYSTEM
========================= */

function pitch(){

    if(game.ballActive) return;

    let types=["fastball","curveball","slider","changeup"];
    ball.pitchType=types[Math.floor(Math.random()*types.length)];

    game.ballActive=true;

    ball.x=450;
    ball.y=200;

    ball.vx=(Math.random()-0.5)*6;
    ball.vy=4;

    game.result=ball.pitchType;
}

/* =========================
   SWING SYSTEM
========================= */

function swing(){

    if(!game.ballActive) return;

    let dist=Math.abs(ball.y-380);

    if(dist<15){
        game.score+=2;
        game.result="PERFECT HIT";
    }
    else if(dist<30){
        game.score+=1;
        game.result="HIT";
    }
    else{
        game.strikes++;
        game.result="MISS";

        if(game.strikes>=3){
            game.outs++;
            game.strikes=0;
        }
    }

    game.ballActive=false;
}

/* =========================
   FIELD
========================= */

function drawField(){

    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#1c7a2f";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="#caa472";
    ctx.beginPath();
    ctx.moveTo(450,420);
    ctx.lineTo(600,260);
    ctx.lineTo(450,120);
    ctx.lineTo(300,260);
    ctx.closePath();
    ctx.fill();
}

/* =========================
   BALL
========================= */

function drawBall(){
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,6,0,Math.PI*2);
    ctx.fill();
}

/* =========================
   UPDATE
========================= */

function update(){

    if(game.ballActive){
        ball.x+=ball.vx;
        ball.y+=ball.vy;

        if(ball.y>500){
            game.ballActive=false;
            game.strikes++;

            if(game.strikes>=3){
                game.outs++;
                game.strikes=0;
            }
        }
    }
}

/* =========================
   UI
========================= */

function ui(){

    document.getElementById("ui").innerHTML=
    "Home: "+homeTeam+
    "<br>Away: "+awayTeam+
    "<br>Score: "+game.score+
    "<br>Strikes: "+game.strikes+
    "<br>Outs: "+game.outs+
    "<br>"+game.result;
}

/* =========================
   LOOP
========================= */

function loop(){

    if(screen==="teamSelect"){
        drawTeamSelect();
        requestAnimationFrame(loop);
        return;
    }

    if(screen==="showcase"){
        drawShowcaseMenu();
        requestAnimationFrame(loop);
        return;
    }

    drawField();
    update();

    if(game.ballActive) drawBall();

    ui();

    requestAnimationFrame(loop);
}

</script>
