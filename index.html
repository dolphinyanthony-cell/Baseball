<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#050805;
    color:white;
    overflow:hidden;
}

/* SCREEN SYSTEM */
.screen{
    display:none;
    width:100%;
    height:100vh;
}

.active{
    display:block;
}

/* ===== MAIN MENU ===== */

#menu{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;

    background:
    radial-gradient(circle at center, #145a2a, #020502);
}

.logo{
    font-size:90px;
    font-weight:900;
    letter-spacing:6px;
    text-align:center;

    color:#f7d774;

    -webkit-text-stroke:3px #5a3a00;

    text-shadow:
    0 5px 0 #7a4f00,
    0 10px 25px black,
    0 0 40px #ffd700;

    transform:skew(-6deg);
}

button{
    margin-top:60px;
    width:320px;
    height:90px;
    font-size:32px;
    font-weight:bold;
    letter-spacing:3px;

    background:linear-gradient(45deg,#8b0000,#d4af37);
    color:white;

    border:3px solid gold;
    border-radius:18px;

    cursor:pointer;

    box-shadow:0 0 25px gold;
}

button:hover{
    transform:scale(1.05);
}

/* ===== GAME SCREEN ===== */

#game{
    background:#0b3d1a;
    position:relative;
}

canvas{
    display:block;
    margin:auto;
    background:#1c7a2f;
    border:4px solid white;
}

.ui{
    position:absolute;
    top:10px;
    left:10px;
    font-size:20px;
}

/* pitch button */
#pitchBtn{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:200px;
    height:60px;
    font-size:22px;
}

</style>

</head>

<body>

<!-- ===== MENU ===== -->
<div id="menu" class="screen active">

    <div class="logo">
        DIAMOND<br>DYNASTY<br>BASEBALL
    </div>

    <button onclick="startGame()">SHOWCASE</button>

</div>

<!-- ===== GAME ===== -->
<div id="game" class="screen">

    <div class="ui" id="ui"></div>

    <canvas id="field" width="900" height="500"></canvas>

    <button id="pitchBtn" onclick="pitch()">PITCH</button>

</div>

<script>

let screen="menu";

let game={
    strikes:0,
    outs:0,
    score:0,
    ballActive:false,
    result:"Ready"
};

let ball={
    x:450,
    y:200,
    vx:0,
    vy:0
};

const canvas=document.getElementById("field");
const ctx=canvas.getContext("2d");

function switchScreen(s){
    document.querySelectorAll(".screen").forEach(sc=>{
        sc.classList.remove("active");
    });
    document.getElementById(s).classList.add("active");
    screen=s;
}

/* ===== START GAME ===== */
function startGame(){
    switchScreen("game");
    loop();
}

/* ===== DRAW FIELD ===== */
function drawField(){

    ctx.clearRect(0,0,900,500);

    // grass
    ctx.fillStyle="#1f7a2f";
    ctx.fillRect(0,0,900,500);

    // dirt diamond
    ctx.fillStyle="#caa472";
    ctx.beginPath();
    ctx.moveTo(450,420);
    ctx.lineTo(600,260);
    ctx.lineTo(450,120);
    ctx.lineTo(300,260);
    ctx.closePath();
    ctx.fill();

    // bases
    ctx.fillStyle="white";
    [[450,420],[600,260],[450,120],[300,260]].forEach(b=>{
        ctx.fillRect(b[0]-8,b[1]-8,16,16);
    });
}

/* ===== BALL ===== */
function drawBall(){
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,6,0,Math.PI*2);
    ctx.fill();
}

/* ===== PITCH ===== */
function pitch(){

    if(game.ballActive) return;

    game.ballActive=true;
    game.result="Ball in play";

    ball.x=450;
    ball.y=200;

    ball.vx=(Math.random()-0.5)*6;
    ball.vy=4;

}

/* ===== SWING (SPACE) ===== */
document.addEventListener("keydown",(e)=>{
    if(e.code==="Space"){
        swing();
    }
});

function swing(){

    if(!game.ballActive) return;

    let dist=Math.abs(ball.y-380);

    if(dist<30){
        game.score+=1;
        game.result="HIT!";
        resetBall();
    }else{
        game.strikes++;
        game.result="MISS";

        if(game.strikes>=3){
            game.outs++;
            game.strikes=0;
            game.result="OUT";
        }

        resetBall();
    }
}

/* ===== RESET BALL ===== */
function resetBall(){
    game.ballActive=false;
    ball.x=450;
    ball.y=200;
}

/* ===== UPDATE ===== */
function update(){

    if(game.ballActive){
        ball.x+=ball.vx;
        ball.y+=ball.vy;

        if(ball.y>500){
            game.ballActive=false;
            game.strikes++;
            game.result="Foul/Missed";

            if(game.strikes>=3){
                game.outs++;
                game.strikes=0;
            }
        }
    }
}

/* ===== UI ===== */
function drawUI(){
    document.getElementById("ui").innerHTML=
    "Score: "+game.score+
    "<br>Strikes: "+game.strikes+
    "<br>Outs: "+game.outs+
    "<br>Result: "+game.result;
}

/* ===== LOOP ===== */
function loop(){

    if(screen!=="game") return;

    drawField();
    update();

    if(game.ballActive) drawBall();

    drawUI();

    requestAnimationFrame(loop);
}

</script>

</body>
</html>
