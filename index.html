<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* DO NOT CHANGE BACKGROUND (as requested) */
#menu{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:
    radial-gradient(circle at center, #0b3d1a, #020502);
}

/* TITLE */
.logo{
    font-size:85px;
    font-weight:900;
    letter-spacing:6px;
    text-align:center;

    color:#f7d774;
    -webkit-text-stroke:3px #5a3a00;

    text-shadow:
    0 5px 0 #7a4f00,
    0 10px 25px black,
    0 0 40px gold;
}

/* BUTTON */
button{
    margin-top:60px;
    width:320px;
    height:90px;

    font-size:32px;
    font-weight:bold;
    letter-spacing:3px;

    background:linear-gradient(45deg,#8b0000,#d4af37);
    color:white;

    border:3px solid gold;
    border-radius:18px;

    cursor:pointer;
    box-shadow:0 0 25px gold;
}

button:hover{
    transform:scale(1.05);
}

/* GAME SCREEN */
#game{
    display:none;
    height:100vh;
    background:#1c7a2f;
    position:relative;
}

canvas{
    display:block;
    margin:auto;
    background:#1c7a2f;
    border:4px solid white;
}

.ui{
    position:absolute;
    top:10px;
    left:10px;
    font-size:18px;
}

/* PITCH BUTTON */
#pitchBtn{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:200px;
    height:60px;
    font-size:20px;
}

</style>
</head>

<body>

<!-- ===== MENU ===== -->
<div id="menu">

    <div class="logo">
        DIAMOND<br>DYNASTY<br>BASEBALL
    </div>

    <button onclick="startShowcase()">
        SHOWCASE
    </button>

</div>

<!-- ===== GAME ===== -->
<div id="game">

    <div class="ui" id="ui"></div>

    <canvas id="c" width="900" height="500"></canvas>

    <button id="pitchBtn" onclick="pitch()">PITCH</button>

</div>

<script>

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

let screen="menu";

let game={
    strikes:0,
    outs:0,
    score:0,
    result:"Ready",
    ballActive:false
};

let ball={
    x:450,
    y:200,
    vx:0,
    vy:0
};

/* ===== SWITCH SCREEN ===== */
function startShowcase(){
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";
    screen="game";
    loop();
}

/* ===== FIELD ===== */
function drawField(){

    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#1c7a2f";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="#caa472";
    ctx.beginPath();
    ctx.moveTo(450,420);
    ctx.lineTo(600,260);
    ctx.lineTo(450,120);
    ctx.lineTo(300,260);
    ctx.closePath();
    ctx.fill();

}

/* ===== BALL ===== */
function drawBall(){
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,6,0,Math.PI*2);
    ctx.fill();
}

/* ===== PITCH ===== */
function pitch(){

    if(game.ballActive) return;

    game.ballActive=true;
    game.result="Pitch thrown";

    ball.x=450;
    ball.y=200;

    ball.vx=(Math.random()-0.5)*6;
    ball.vy=4;
}

/* ===== SWING ===== */
document.addEventListener("keydown",(e)=>{
    if(e.code==="Space"){
        swing();
    }
});

function swing(){

    if(!game.ballActive) return;

    let dist=Math.abs(ball.y-380);

    if(dist<30){
        game.score++;
        game.result="HIT!";
    }else{
        game.strikes++;
        game.result="MISS";

        if(game.strikes>=3){
            game.outs++;
            game.strikes=0;
        }
    }

    game.ballActive=false;
}

/* ===== UPDATE ===== */
function update(){

    if(game.ballActive){
        ball.x+=ball.vx;
        ball.y+=ball.vy;

        if(ball.y>500){
            game.ballActive=false;
            game.strikes++;

            if(game.strikes>=3){
                game.outs++;
                game.strikes=0;
            }
        }
    }
}

/* ===== UI ===== */
function ui(){
    document.getElementById("ui").innerHTML=
    "Score: "+game.score+
    "<br>Strikes: "+game.strikes+
    "<br>Outs: "+game.outs+
    "<br>"+game.result;
}

/* ===== LOOP ===== */
function loop(){

    if(screen!=="game") return;

    drawField();
    update();

    if(game.ballActive) drawBall();

    ui();

    requestAnimationFrame(loop);
}

</script>

</body>
</html>
