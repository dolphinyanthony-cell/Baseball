<script>

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

let screen="menu"; // menu | showcase | game | derby | practice

let mode="";

let game={
    score:0,
    strikes:0,
    outs:0,
    balls:0,
    inning:1,
    result:"Ready",
    ballActive:false
};

let ball={
    x:450,
    y:200,
    vx:0,
    vy:0,
    pitchType:"fastball"
};

/* =========================
   SCREEN SYSTEM (EXPANDED)
========================= */

function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("game").style.display="block";

    screen="showcase";

    drawShowcaseMenu();
}

/* =========================
   SHOWCASE MENU (NEW)
========================= */

function drawShowcaseMenu(){

    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#0b3d1a";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("SHOWCASE MODE",300,80);

    ctx.font="25px Arial";

    ctx.fillText("1 - Play Game",350,160);
    ctx.fillText("2 - Home Run Derby",350,210);
    ctx.fillText("3 - Pitching Practice",350,260);
    ctx.fillText("4 - Batting Practice",350,310);
    ctx.fillText("B - Back",350,360);
}

/* =========================
   INPUT HANDLER
========================= */

document.addEventListener("keydown",(e)=>{

    if(screen==="showcase"){

        if(e.key==="1") startMatch();
        if(e.key==="2") startDerby();
        if(e.key==="3") startPractice();
        if(e.key==="4") startPractice();
        if(e.key.toLowerCase()==="b") backToMenu();
    }

    if(e.code==="Space"){
        swing();
    }

});

/* =========================
   NAVIGATION
========================= */

function backToMenu(){
    document.getElementById("game").style.display="none";
    document.getElementById("menu").style.display="flex";
    screen="menu";
}

/* =========================
   GAME MODES
========================= */

function startMatch(){
    screen="gameplay";
    game.score=0;
    game.strikes=0;
    game.outs=0;
    loop();
}

function startDerby(){
    screen="derby";
    loop();
}

function startPractice(){
    screen="practice";
    loop();
}

/* =========================
   PITCH TYPES (NEW)
========================= */

function pitch(){

    if(game.ballActive) return;

    let types=["fastball","curveball","slider","changeup"];
    ball.pitchType=types[Math.floor(Math.random()*types.length)];

    game.ballActive=true;

    ball.x=450;
    ball.y=200;

    if(ball.pitchType==="fastball"){
        ball.vx=(Math.random()-0.5)*6;
        ball.vy=5;
    }

    if(ball.pitchType==="curveball"){
        ball.vx=(Math.random()-0.5)*3;
        ball.vy=4;
    }

    if(ball.pitchType==="slider"){
        ball.vx=(Math.random()-0.5)*8;
        ball.vy=4;
    }

    if(ball.pitchType==="changeup"){
        ball.vx=(Math.random()-0.5)*2;
        ball.vy=3;
    }

    game.result="Pitch: "+ball.pitchType;
}

/* =========================
   SWING SYSTEM (UPGRADED)
========================= */

function swing(){

    if(!game.ballActive) return;

    let dist=Math.abs(ball.y-380);

    let quality="MISS";

    if(dist<10){
        quality="PERFECT HIT";
        game.score+=2;
    }
    else if(dist<25){
        quality="GOOD HIT";
        game.score+=1;
    }
    else if(dist<40){
        quality="WEAK CONTACT";
        game.score+=0;
    }

    if(dist<40){
        if(Math.random()<0.3){
            game.result="GROUND BALL";
        }else if(Math.random()<0.6){
            game.result="FLY BALL";
        }else{
            game.result="HOME RUN";
            game.score+=3;
        }
    }else{
        game.strikes++;
        game.result="STRIKE";
    }

    game.ballActive=false;

    if(game.strikes>=3){
        game.outs++;
        game.strikes=0;
    }
}

/* =========================
   FIELD
========================= */

function drawField(){

    ctx.clearRect(0,0,900,500);

    ctx.fillStyle="#1c7a2f";
    ctx.fillRect(0,0,900,500);

    ctx.fillStyle="#caa472";
    ctx.beginPath();
    ctx.moveTo(450,420);
    ctx.lineTo(600,260);
    ctx.lineTo(450,120);
    ctx.lineTo(300,260);
    ctx.closePath();
    ctx.fill();
}

/* =========================
   BALL
========================= */

function drawBall(){
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,6,0,Math.PI*2);
    ctx.fill();
}

/* =========================
   UPDATE
========================= */

function update(){

    if(game.ballActive){

        ball.x+=ball.vx;
        ball.y+=ball.vy;

        if(ball.y>500){
            game.ballActive=false;
            game.strikes++;

            if(game.strikes>=3){
                game.outs++;
                game.strikes=0;
            }
        }
    }
}

/* =========================
   UI
========================= */

function ui(){

    document.getElementById("ui").innerHTML=
    "Mode: "+screen+
    "<br>Score: "+game.score+
    "<br>Strikes: "+game.strikes+
    "<br>Outs: "+game.outs+
    "<br>"+game.result+
    "<br>Pitch: "+ball.pitchType;
}

/* =========================
   LOOP
========================= */

function loop(){

    if(screen==="menu") return;

    if(screen==="showcase"){
        drawShowcaseMenu();
        requestAnimationFrame(loop);
        return;
    }

    drawField();
    update();

    if(game.ballActive) drawBall();

    ui();

    requestAnimationFrame(loop);
}

</script>
