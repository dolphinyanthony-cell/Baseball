<!DOCTYPE html>
<html>

<head>

<title>Diamond Dynasty Baseball</title>

<style>

body {

    margin: 0;
    height: 100vh;

    background:
    radial-gradient(circle at top, #0b5d1e, #001a08);

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: Arial, Helvetica, sans-serif;

    overflow: hidden;

}



/* MAIN MENU BOX */

.menu {

    text-align: center;

}



/* GAME TITLE */

.title {

    font-size: 80px;

    font-weight: 900;

    letter-spacing: 6px;

    line-height: 0.9;


    background:

    linear-gradient(
        90deg,
        #ffd700,
        white,
        #00ff88,
        #ffd700
    );


    background-size: 300%;


    -webkit-background-clip: text;

    color: transparent;


    animation: shine 5s infinite;


    text-shadow:
    0px 0px 30px gold;

}



@keyframes shine {

    0% {

        background-position: 0%;

    }


    50% {

        background-position: 100%;

    }


    100% {

        background-position: 0%;

    }

}





.subtitle {

    margin-top: 25px;

    color:white;

    font-size:25px;

    letter-spacing:5px;

}






/* BUTTON */

button {


    margin-top:60px;


    width:320px;

    height:90px;


    font-size:35px;

    font-weight:bold;


    color:white;


    background:

    linear-gradient(
        45deg,
        #8b0000,
        #d4af37
    );


    border:

    3px solid gold;


    border-radius:20px;


    cursor:pointer;


    box-shadow:

    0 0 25px gold;


    transition:.3s;

}



button:hover {


    transform:scale(1.1);


    box-shadow:

    0 0 50px gold;


}





/* FIELD EFFECT */

.field {


    position:absolute;

    bottom:-100px;

    width:600px;

    height:250px;


    background:#1f7a32;


    border-radius:50%;


    opacity:.5;


}



</style>


</head>





<body>



<div class="menu">


<div class="title">

DIAMOND

<br>

DYNASTY

<br>

BASEBALL

</div>



<div class="subtitle">

THE ULTIMATE BASEBALL EXPERIENCE

</div>



<button onclick="showcase()">

SHOWCASE

</button>



</div>




<div class="field"></div>






<script>


function showcase(){


    // Showcase mode will be built here later


    console.log("Showcase button pressed");


}



</script>





</body>


</html>
