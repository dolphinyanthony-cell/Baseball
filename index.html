<!DOCTYPE html>
<html>

<head>

<title>Diamond Dynasty Baseball</title>

<style>


body {

    margin:0;

    height:100vh;

    background:

    radial-gradient(
        circle at center,
        #123d1c,
        #020802
    );


    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    font-family:Arial, Helvetica, sans-serif;

}




.container {

    text-align:center;

}




/* CUSTOM GAME LOGO */

.logo {


    font-size:90px;

    font-weight:1000;

    letter-spacing:8px;

    line-height:.85;


    color:#f7d774;


    text-transform:uppercase;


    -webkit-text-stroke:

    3px #5a3900;


    text-shadow:

    0 5px 0 #7a5200,

    0 10px 25px black,

    0 0 40px #ffd700;


    transform:skew(-5deg);


}



.logo span {


    display:block;


    background:

    linear-gradient(

    180deg,

    #fff4b0,

    #d99b00

    );


    -webkit-background-clip:text;


    color:transparent;


}





/* BUTTON */


button {


    margin-top:80px;


    width:330px;

    height:95px;


    font-size:38px;

    font-weight:bold;


    letter-spacing:4px;


    color:white;


    background:

    linear-gradient(

    135deg,

    #8b0000,

    #d4af37

    );


    border:

    4px solid #ffd700;


    border-radius:18px;


    cursor:pointer;


    box-shadow:

    0 0 25px #ffd700;


    transition:.3s;


}



button:hover {


    transform:scale(1.08);


    box-shadow:

    0 0 50px #ffd700;


}




/* BACKGROUND FIELD */

.field {


    position:absolute;

    bottom:-200px;

    width:700px;

    height:400px;


    background:#145214;


    border-radius:50%;


    opacity:.5;


}



</style>


</head>




<body>



<div class="container">


<div class="logo">

<span>
DIAMOND
</span>

<span>
DYNASTY
</span>

<span>
BASEBALL
</span>


</div>




<button onclick="showcase()">

SHOWCASE

</button>



</div>




<div class="field"></div>




<script>


function showcase(){

// Showcase mode will be created later

console.log("Showcase selected");

}



</script>



</body>


</html>
