<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>
body{
    margin:0;
    overflow:hidden;
}
canvas{ display:block; }

#hud{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:Arial;
    font-size:22px;
    text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<div id="hud">
DIAMOND DYNASTY BASEBALL<br>
CLEAN FIELD ALIGNMENT
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// CAMERA (true batter view alignment)
const camera = new THREE.PerspectiveCamera(
65,
window.innerWidth/window.innerHeight,
0.1,
500
);

// pulled slightly back for better alignment feel
camera.position.set(0,7,22);
camera.lookAt(0,3,-40);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.7));

const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(20,50,20);
scene.add(sun);

// =====================
// GRASS (OUTFIELD BASE)
// =====================
const grass = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x1f7a35})
);
grass.rotation.x = -Math.PI/2;
scene.add(grass);

// =====================
// INFIELD DIRT (CENTERED DIAMOND)
// =====================
const dirt = new THREE.Mesh(
new THREE.CircleGeometry(26,32),
new THREE.MeshStandardMaterial({color:0xb8753d})
);
dirt.rotation.x = -Math.PI/2;
dirt.position.set(0,0.02,-8); // 👈 moved forward to align with field
scene.add(dirt);

// =====================
// BASEPATHS (NEAT DIAMOND LAYOUT)
// =====================
function path(x,z,rot){
const p = new THREE.Mesh(
new THREE.BoxGeometry(3,0.05,32),
new THREE.MeshStandardMaterial({color:0xb8753d})
);
p.position.set(x,0.01,z);
p.rotation.y = rot;
scene.add(p);
}

// aligned to real diamond shape
path(8,-10,-0.6);
path(0,-22,0);
path(-8,-10,0.6);

// =====================
// HOME PLATE (PENTAGON) - MOVED FORWARD
// =====================
function makeHomePlate(){

const shape = new THREE.Shape();

shape.moveTo(0,0);
shape.lineTo(1,0.5);
shape.lineTo(0.6,1.2);
shape.lineTo(-0.6,1.2);
shape.lineTo(-1,0.5);
shape.closePath();

const plate = new THREE.Mesh(
new THREE.ShapeGeometry(shape),
new THREE.MeshStandardMaterial({color:0xffffff})
);

plate.rotation.x = -Math.PI/2;

// 👇 moved forward so everything aligns correctly
plate.position.set(0,0.08,6);

scene.add(plate);

}
makeHomePlate();

// =====================
// BASES (REALIGNMENT FIX)
// =====================

// 1st base
const base1 = new THREE.Mesh(
new THREE.BoxGeometry(1.4,0.1,1.4),
new THREE.MeshStandardMaterial({color:0xffffff})
);
base1.position.set(14,0.08,-8);
scene.add(base1);

// 2nd base (CENTERED CORRECTLY)
const base2 = new THREE.Mesh(
new THREE.BoxGeometry(1.4,0.1,1.4),
new THREE.MeshStandardMaterial({color:0xffffff})
);
base2.position.set(0,0.08,-22);
scene.add(base2);

// 3rd base
const base3 = new THREE.Mesh(
new THREE.BoxGeometry(1.4,0.1,1.4),
new THREE.MeshStandardMaterial({color:0xffffff})
);
base3.position.set(-14,0.08,-8);
scene.add(base3);

// =====================
// PITCHER MOUND (CENTERED PROPERLY)
// =====================
const mound = new THREE.Mesh(
new THREE.CylinderGeometry(3.5,3.5,0.4,32),
new THREE.MeshStandardMaterial({color:0xb8753d})
);
mound.position.set(0,0.2,-12);
scene.add(mound);

// =====================
// WALL (FULL OUTFIELD)
// =====================
const wallMat = new THREE.MeshStandardMaterial({color:0x1f4d2e});

// center
const centerWall = new THREE.Mesh(
new THREE.BoxGeometry(140,10,1),
wallMat
);
centerWall.position.set(0,5,-85);
scene.add(centerWall);

// left
const leftWall = new THREE.Mesh(
new THREE.BoxGeometry(1,10,120),
wallMat
);
leftWall.position.set(-70,5,-40);
scene.add(leftWall);

// right
const rightWall = new THREE.Mesh(
new THREE.BoxGeometry(1,10,120),
wallMat
);
rightWall.position.set(70,5,-40);
scene.add(rightWall);

// =====================
// BALL (TEST)
// =====================
const ball = new THREE.Mesh(
new THREE.SphereGeometry(0.25,16,16),
new THREE.MeshStandardMaterial({color:0xffffff})
);
scene.add(ball);

let z = -12;

// LOOP
function animate(){
requestAnimationFrame(animate);

z += 0.35;
if(z > 12) z = -12;

ball.position.set(0,3,z);

renderer.render(scene,camera);
}
animate();

// RESIZE
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
