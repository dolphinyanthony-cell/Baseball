<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

canvas{
    display:block;
}
</style>

</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87ceeb);


const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);


const renderer = new THREE.WebGLRenderer();

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(renderer.domElement);


// LIGHT

let light = new THREE.DirectionalLight(
    0xffffff,
    2
);

light.position.set(5,10,5);

scene.add(light);


// FIELD

let field = new THREE.Mesh(

    new THREE.PlaneGeometry(100,100),

    new THREE.MeshStandardMaterial({
        color:0x228B22
    })

);

field.rotation.x=-Math.PI/2;

scene.add(field);


// PITCHER

let pitcher = new THREE.Mesh(

    new THREE.BoxGeometry(2,5,2),

    new THREE.MeshStandardMaterial({
        color:0xff0000
    })

);

pitcher.position.set(
    0,
    2.5,
    -40
);

scene.add(pitcher);


// BATTER

let batter = new THREE.Mesh(

    new THREE.BoxGeometry(2,5,2),

    new THREE.MeshStandardMaterial({
        color:0x0000ff
    })

);

batter.position.set(
    0,
    2.5,
    5
);

scene.add(batter);


// BALL

let ball = new THREE.Mesh(

    new THREE.SphereGeometry(.4),

    new THREE.MeshStandardMaterial({
        color:0xffffff
    })

);

scene.add(ball);


// CAMERA

camera.position.set(
    0,
    5,
    12
);

camera.lookAt(
    0,
    3,
    -40
);


// BALL MOVEMENT

let z=-40;


function animate(){

requestAnimationFrame(animate);


z+=0.5;

if(z>8){
    z=-40;
}

ball.position.set(
    0,
    3,
    z
);


renderer.render(
    scene,
    camera
);

}


animate();


window.addEventListener(
"resize",
()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});


</script>

</body>
</html>
