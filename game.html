<!DOCTYPE html>
<html>

<head>
<title>Game</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#081a12;
    font-family:Arial;
}

/* SCOREBOARD */
#scoreboard{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:18px;
    letter-spacing:2px;
    background:rgba(0,0,0,0.65);
    padding:10px 16px;
    border-radius:10px;
}

#count{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-size:16px;
    opacity:0.85;
}

#hint{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:#ddd;
    font-size:14px;
    opacity:0.7;
}

canvas{
    display:block;
    margin:auto;
    background:linear-gradient(#2a7a45,#0f3a22);
}

</style>
</head>

<body>

<div id="scoreboard">
    <span id="home"></span>
    <span>  -  </span>
    <span id="away"></span>
</div>

<div id="count"></div>
<div id="hint">SPACE = Swing (batter’s view timing)</div>

<canvas id="c" width="900" height="500"></canvas>

<script>

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

let homeTeam=localStorage.getItem("homeTeam");
let awayTeam=localStorage.getItem("awayTeam");

document.getElementById("home").innerText=homeTeam;
document.getElementById("away").innerText=awayTeam;

/* ===== GAME STATE ===== */
let game={
    homeScore:0,
    awayScore:0,
    strikes:0,
    balls:0,
    result:"PLAY BALL"
};

/* ===== BALL (PITCH COMES TOWARD YOU) ===== */
let ball={
    x:450,
    y:80,
    z:0,        // depth (0 far → 1 close)
    speed:0.012,
    active:true
};

const plateY=410;

/* ===== RESET PITCH ===== */
function resetPitch(){
    ball.x=450;
    ball.y=80;
    ball.z=0;
    ball.speed=0.010 + Math.random()*0.006;
    ball.active=true;
}

resetPitch();

/* ===== SWING ===== */
function swing(){

    if(!ball.active) return;

    let timing=Math.abs(ball.z-0.82); // sweet spot near plate

    if(timing<0.05){
        game.homeScore++;
        game.result="SOLID CONTACT";
    }
    else if(timing<0.12){
        game.result="FOUL / WEAK CONTACT";
    }
    else{
        game.strikes++;
        game.result="MISS";
    }

    ball.active=false;
    setTimeout(resetPitch,700);

    checkCount();
}

/* ===== COUNT ===== */
function checkCount(){

    if(game.strikes>=3){
        game.strikes=0;
        game.balls=0;
        game.result="OUT";
        setTimeout(resetPitch,800);
    }

    if(game.balls>=4){
        game.homeScore++;
        game.strikes=0;
        game.balls=0;
        game.result="WALK";
        setTimeout(resetPitch,800);
    }
}

/* ===== UPDATE BALL (APPROACHES CAMERA) ===== */
function update(){

    if(ball.active){

        ball.z+=ball.speed;

        // ball reaches plate
        if(ball.z>1){
            game.balls++;
            ball.active=false;
            game.result="BALL";
            setTimeout(resetPitch,600);
            checkCount();
        }
    }
}

/* ===== DRAW FIELD (BATTER POV) ===== */
function drawField(){

    ctx.clearRect(0,0,900,500);

    // sky gradient
    let sky=ctx.createLinearGradient(0,0,0,500);
    sky.addColorStop(0,"#1e6b9a");
    sky.addColorStop(1,"#0c2a1a");

    ctx.fillStyle=sky;
    ctx.fillRect(0,0,900,500);

    // infield perspective (vanishing point feel)
    ctx.fillStyle="#c2a36b";
    ctx.beginPath();
    ctx.moveTo(450,500);
    ctx.lineTo(650,200);
    ctx.lineTo(450,120);
    ctx.lineTo(250,200);
    ctx.closePath();
    ctx.fill();

    // plate
    ctx.fillStyle="white";
    ctx.fillRect(445,405,10,6);

    // strike zone (batter view)
    ctx.strokeStyle="rgba(255,255,255,0.25)";
    ctx.strokeRect(380,330,140,140);
}

/* ===== BALL (PERSPECTIVE SCALING) ===== */
function drawBall(){

    if(!ball.active) return;

    let size=2 + ball.z*10;

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x, 100 + ball.z*300, size, 0, Math.PI*2);
    ctx.fill();
}

/* ===== INPUT ===== */
document.addEventListener("keydown",(e)=>{
    if(e.code==="Space"){
        swing();
    }
});

/* ===== UI ===== */
function ui(){

    document.getElementById("count").innerText=
    "STRIKES: "+game.strikes+
    " | BALLS: "+game.balls+
    " | "+game.result;

    document.getElementById("scoreboard").innerHTML=
    "<b>"+homeTeam+"</b>  "+game.homeScore+
    " - "+
    game.awayScore+"  <b>"+awayTeam+"</b>";
}

/* ===== LOOP ===== */
function loop(){

    drawField();
    update();
    drawBall();
    ui();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
