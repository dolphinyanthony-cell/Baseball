<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty 3D Baseball</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-family:Arial;
    font-size:18px;
    text-shadow:0 2px 8px black;
}
</style>

</head>

<body>

<div id="hud"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>


// =============================
// BASIC 3D SETUP
// =============================

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x79bce8);


const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth/window.innerHeight,
    0.1,
    500
);


const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(renderer.domElement);


// =============================
// LIGHTING
// =============================

const sun = new THREE.DirectionalLight(
    0xffffff,
    2
);

sun.position.set(20,40,20);

scene.add(sun);


scene.add(
    new THREE.AmbientLight(
        0xffffff,
        .5
    )
);


// =============================
// FIELD
// =============================

const grass = new THREE.Mesh(

    new THREE.PlaneGeometry(
        120,
        120
    ),

    new THREE.MeshStandardMaterial({
        color:0x176b32
    })

);

grass.rotation.x=-Math.PI/2;

scene.add(grass);


// =============================
// INFIELD DIRT
// =============================

const dirt = new THREE.Mesh(

    new THREE.CircleGeometry(
        20,
        64
    ),

    new THREE.MeshStandardMaterial({
        color:0xb88952
    })

);

dirt.rotation.x=-Math.PI/2;

dirt.position.y=.02;

scene.add(dirt);


// =============================
// BASES
// =============================

function createBase(x,z){

    let base=new THREE.Mesh(

        new THREE.BoxGeometry(
            1,
            .1,
            1
        ),

        new THREE.MeshStandardMaterial({
            color:white
        })

    );

    base.position.set(
        x,
        .08,
        z
    );

    scene.add(base);
}


createBase(0,0);       // home
createBase(0,-18);     // second
createBase(-18,-18);   // third
createBase(18,-18);    // first



// =============================
// FOUL LINES
// =============================

function line(x1,z1,x2,z2){

    let material =
    new THREE.LineBasicMaterial({
        color:white
    });


    let points=[];

    points.push(
        new THREE.Vector3(x1,.05,z1)
    );

    points.push(
        new THREE.Vector3(x2,.05,z2)
    );


    let geometry =
    new THREE.BufferGeometry()
    .setFromPoints(points);


    let l =
    new THREE.Line(
        geometry,
        material
    );

    scene.add(l);
}


line(0,0,-60,-60);
line(0,0,60,-60);


// =============================
// PLAYERS
// =============================

function player(color,x,z){

    let body =
    new THREE.Mesh(

        new THREE.CapsuleGeometry(
            .4,
            1.3,
            4,
            8
        ),

        new THREE.MeshStandardMaterial({
            color:color
        })

    );

    body.position.set(
        x,
        1,
        z
    );

    scene.add(body);

    return body;
}


// pitcher
player(0xff0000,0,-55);


// batter
player(0x0044ff,0,4);


// fielders
player(0xffffff,-12,-18);
player(0xffffff,12,-18);
player(0xffffff,-35,-35);
player(0xffffff,0,-45);
player(0xffffff,35,-35);


// =============================
// OUTFIELD WALL
// =============================

let wall =
new THREE.Mesh(

    new THREE.TorusGeometry(
        55,
        .4,
        8,
        80,
        Math.PI
    ),

    new THREE.MeshStandardMaterial({
        color:0x333333
    })

);

wall.rotation.x=Math.PI/2;
wall.position.y=2;

scene.add(wall);


// =============================
// BALL
// =============================

let ball =
new THREE.Mesh(

    new THREE.SphereGeometry(
        .25,
        20,
        20
    ),

    new THREE.MeshStandardMaterial({
        color:white
    })

);

scene.add(ball);



let pitchProgress=0;


function pitch(){

    pitchProgress=0;

}


pitch();


// =============================
// CAMERA - BATTER VIEW
// =============================

camera.position.set(
    0,
    3,
    8
);


camera.lookAt(
    0,
    2,
    -40
);


// =============================
// SWING
// =============================

document.addEventListener(
"keydown",
function(e){

    if(e.code==="Space"){

        if(
            Math.abs(ball.position.z-2)<3
        ){

            ball.position.y+=5;

        }

    }

});


// =============================
// LOOP
// =============================

function animate(){

    requestAnimationFrame(
        animate
    );


    pitchProgress+=.01;


    ball.position.set(
        0,
        1.8,
        -55 + pitchProgress*60
    );


    document.getElementById("hud").innerHTML=
    "DIAMOND DYNASTY BASEBALL<br>"+
    "3D STADIUM ENGINE<br>"+
    "SPACE = SWING";


    renderer.render(
        scene,
        camera
    );

}


animate();


// resize

window.addEventListener(
"resize",
()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});


</script>

</body>
</html>
