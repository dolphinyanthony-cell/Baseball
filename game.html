<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-family:Arial;
    font-size:18px;
}
</style>

</head>

<body>

<div id="hud">
DIAMOND DYNASTY BASEBALL<br>
3D FIELD TEST
</div>


<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>


<script>


// SCENE

const scene = new THREE.Scene();

scene.background = new THREE.Color(0x87ceeb);


// CAMERA

const camera = new THREE.PerspectiveCamera(
    65,
    window.innerWidth / window.innerHeight,
    0.1,
    500
);

camera.position.set(
    0,
    5,
    14
);

camera.lookAt(
    0,
    2,
    -40
);


// RENDERER

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(renderer.domElement);


// LIGHT

const light = new THREE.DirectionalLight(
    0xffffff,
    2
);

light.position.set(
    20,
    40,
    20
);

scene.add(light);


scene.add(
    new THREE.AmbientLight(
        0xffffff,
        0.5
    )
);


// FIELD

const field = new THREE.Mesh(

    new THREE.PlaneGeometry(
        120,
        120
    ),

    new THREE.MeshStandardMaterial({
        color:0x1f7a32
    })

);

field.rotation.x = -Math.PI/2;

scene.add(field);


// DIRT DIAMOND

const dirt = new THREE.Mesh(

    new THREE.CircleGeometry(
        20,
        32
    ),

    new THREE.MeshStandardMaterial({
        color:0xb88952
    })

);

dirt.rotation.x=-Math.PI/2;
dirt.position.y=0.02;

scene.add(dirt);


// BASE FUNCTION

function addBase(x,z){

const base = new THREE.Mesh(

new THREE.BoxGeometry(
    1,
    .1,
    1
),

new THREE.MeshStandardMaterial({
    color:0xffffff
})

);

base.position.set(
    x,
    .1,
    z
);

scene.add(base);

}


// BASES

addBase(0,0);
addBase(18,-18);
addBase(0,-36);
addBase(-18,-18);


// PLAYERS

function addPlayer(color,x,z){

const player = new THREE.Mesh(

new THREE.BoxGeometry(
    1,
    2,
    1
),

new THREE.MeshStandardMaterial({
    color:color
})

);

player.position.set(
    x,
    1,
    z
);

scene.add(player);

}


// Batter

addPlayer(
0x0066ff,
0,
5
);


// Pitcher

addPlayer(
0xff0000,
0,
-30
);


// Fielders

addPlayer(0xffffff,-15,-20);
addPlayer(0xffffff,15,-20);
addPlayer(0xffffff,-35,-45);
addPlayer(0xffffff,0,-55);
addPlayer(0xffffff,35,-45);


// BALL

const ball = new THREE.Mesh(

new THREE.SphereGeometry(
    .3,
    16,
    16
),

new THREE.MeshStandardMaterial({
    color:0xffffff
})

);

scene.add(ball);


let ballZ=-30;


// ANIMATION

function animate(){

requestAnimationFrame(
    animate
);


ballZ += 0.3;


if(ballZ > 10){
    ballZ=-30;
}


ball.position.set(
    0,
    3,
    ballZ
);


renderer.render(
    scene,
    camera
);

}


animate();


// RESIZE

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();


renderer.setSize(
window.innerWidth,
window.innerHeight
);

});


</script>


</body>

</html>
