<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }

#hud{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:Arial;
    font-size:22px;
    text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<div id="hud">
REAL BASEBALL FIELD (CLEAN LAYOUT)
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// CAMERA (true batter angle)
const camera = new THREE.PerspectiveCamera(
65,
window.innerWidth/window.innerHeight,
0.1,
500
);

camera.position.set(0,7,22);
camera.lookAt(0,3,-25);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.7));

const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(20,50,20);
scene.add(sun);

// =====================
// GRASS (OUTFIELD BASE)
// =====================
const grass = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x1f7a35})
);
grass.rotation.x = -Math.PI/2;
scene.add(grass);

// =====================
// INFIELD GRASS (cutout style)
// =====================
const infieldGrass = new THREE.Mesh(
new THREE.CircleGeometry(30,32),
new THREE.MeshStandardMaterial({color:0x2c9c4a})
);
infieldGrass.rotation.x = -Math.PI/2;
infieldGrass.position.set(0,0.03,-10);
scene.add(infieldGrass);

// =====================
// INFIELD DIRT (DIAMOND)
// =====================
const dirt = new THREE.Mesh(
new THREE.ShapeGeometry(new THREE.Shape([
new THREE.Vector2(0,0),
new THREE.Vector2(12,-12),
new THREE.Vector2(0,-24),
new THREE.Vector2(-12,-12)
])),
new THREE.MeshStandardMaterial({color:0xb8753d})
);
dirt.rotation.x = -Math.PI/2;
dirt.position.set(0,0.04,-10);
scene.add(dirt);

// =====================
// BASEPATHS (DIRT ONLY)
// =====================
function path(x,z,rot){
const p = new THREE.Mesh(
new THREE.BoxGeometry(2.5,0.05,26),
new THREE.MeshStandardMaterial({color:0xb8753d})
);
p.position.set(x,0.03,z);
p.rotation.y = rot;
scene.add(p);
}

path(6,-10,-0.7);   // home → 1st
path(0,-22,0);      // 1st → 2nd
path(-6,-10,0.7);   // 2nd → 3rd

// =====================
// HOME PLATE (PENTAGON)
// =====================
function homePlate(){
const shape = new THREE.Shape();
shape.moveTo(0,0);
shape.lineTo(1,0.5);
shape.lineTo(0.6,1.2);
shape.lineTo(-0.6,1.2);
shape.lineTo(-1,0.5);
shape.closePath();

const plate = new THREE.Mesh(
new THREE.ShapeGeometry(shape),
new THREE.MeshStandardMaterial({color:0xffffff})
);

plate.rotation.x = -Math.PI/2;
plate.position.set(0,0.08,0);

scene.add(plate);
}
homePlate();

// =====================
// BASES (REAL DIAMOND)
// =====================
function base(x,z){
const b = new THREE.Mesh(
new THREE.BoxGeometry(1.3,0.1,1.3),
new THREE.MeshStandardMaterial({color:0xffffff})
);
b.position.set(x,0.08,z);
scene.add(b);
}

// real diamond spacing
base(12,-12);   // 1st
base(0,-24);    // 2nd (perfect center)
base(-12,-12);  // 3rd

// =====================
// PITCHER MOUND
// =====================
const mound = new THREE.Mesh(
new THREE.CylinderGeometry(3,3,0.35,32),
new THREE.MeshStandardMaterial({color:0xb8753d})
);
mound.position.set(0,0.2,-16);
scene.add(mound);

// =====================
// OUTFIELD WALL (STRAIGHT)
// =====================
const wall = new THREE.Mesh(
new THREE.BoxGeometry(160,10,1),
new THREE.MeshStandardMaterial({color:0x1f4d2e})
);
wall.position.set(0,5,-95);
scene.add(wall);

// =====================
// BALL (TEST PITCH)
// =====================
const ball = new THREE.Mesh(
new THREE.SphereGeometry(0.25,16,16),
new THREE.MeshStandardMaterial({color:0xffffff})
);
scene.add(ball);

let z = -16;

// LOOP
function animate(){
requestAnimationFrame(animate);

z += 0.3;
if(z > 10) z = -16;

ball.position.set(0,3,z);

renderer.render(scene,camera);
}
animate();

// RESIZE
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
