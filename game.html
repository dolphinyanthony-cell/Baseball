<!DOCTYPE html>
<html>

<head>
<title>Batter View Baseball</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

/* FULLSCREEN FIELD */
canvas{
    width:100vw;
    height:100vh;
    display:block;
}

/* HUD */
#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-size:18px;
    text-shadow:0 2px 10px rgba(0,0,0,0.8);
}

/* STRIKE ZONE FEEL (MLB STYLE) */
#zone{
    position:absolute;
    left:50%;
    top:52%;
    transform:translate(-50%,-50%);
    width:140px;
    height:200px;
    border:1px solid rgba(255,255,255,0.25);
    pointer-events:none;
}

</style>
</head>

<body>

<div id="hud"></div>
<div id="zone"></div>

<canvas id="c"></canvas>

<script>

let c=document.getElementById("c");
let ctx=c.getContext("2d");

function resize(){
    c.width=window.innerWidth;
    c.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* TEAMS */
let homeTeam=localStorage.getItem("homeTeam");
let awayTeam=localStorage.getItem("awayTeam");

/* GAME */
let game={
    home:0,
    away:0,
    strikes:0,
    balls:0,
    result:"READY"
};

/* BATTER VIEW BALL (DEPTH SYSTEM) */
let ball={
    z:0,          // 0 far, 1 plate
    speed:0.012,
    active:true
};

/* PITCH RESET */
function pitch(){
    ball.z=0;
    ball.speed=0.010+Math.random()*0.006;
    ball.active=true;
}

pitch();

/* SWING */
document.addEventListener("keydown",(e)=>{
    if(e.code==="Space") swing();
});

function swing(){

    if(!ball.active) return;

    let timing=Math.abs(ball.z-0.83);

    if(timing<0.05){
        game.home++;
        game.result="PERFECT CONTACT";
    }
    else if(timing<0.11){
        game.result="CONTACT";
    }
    else{
        game.strikes++;
        game.result="MISS";
    }

    ball.active=false;
    setTimeout(pitch,700);

    check();
}

/* COUNT */
function check(){

    if(game.strikes>=3){
        game.strikes=0;
        game.balls=0;
        game.result="OUT";
        setTimeout(pitch,900);
    }

    if(game.balls>=4){
        game.home++;
        game.strikes=0;
        game.balls=0;
        game.result="WALK";
        setTimeout(pitch,900);
    }
}

/* UPDATE */
function update(){

    if(ball.active){
        ball.z+=ball.speed;

        if(ball.z>1){
            game.balls++;
            game.result="BALL";
            ball.active=false;
            setTimeout(pitch,600);
            check();
        }
    }
}

/* DRAW FIELD (TRUE BATTER POV DEPTH) */
function draw(){

    ctx.clearRect(0,0,c.width,c.height);

    // sky
    let g=ctx.createLinearGradient(0,0,0,c.height);
    g.addColorStop(0,"#1e6f9c");
    g.addColorStop(1,"#0a2416");

    ctx.fillStyle=g;
    ctx.fillRect(0,0,c.width,c.height);

    // infield perspective
    ctx.fillStyle="#c2a36b";
    ctx.beginPath();
    ctx.moveTo(c.width/2,c.height);
    ctx.lineTo(c.width*0.78,c.height*0.25);
    ctx.lineTo(c.width/2,c.height*0.18);
    ctx.lineTo(c.width*0.22,c.height*0.25);
    ctx.closePath();
    ctx.fill();

    // pitcher mound (center focus)
    ctx.fillStyle="#b48a55";
    ctx.beginPath();
    ctx.arc(c.width/2,c.height*0.45,18,0,Math.PI*2);
    ctx.fill();

    // plate
    ctx.fillStyle="white";
    ctx.fillRect(c.width/2-10,c.height*0.78,20,8);

}

/* BALL (DEPTH + SCALE = MLB STYLE FEEL) */
function drawBall(){

    if(!ball.active) return;

    let x=c.width/2;
    let y=c.height*0.15 + ball.z*(c.height*0.65);
    let size=2 + ball.z*16;

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fill();
}

/* HUD */
function hud(){

    document.getElementById("hud").innerHTML=
    "<b>"+homeTeam+" vs "+awayTeam+"</b><br>"+
    "Score: "+game.home+"<br>"+
    "Strikes: "+game.strikes+" Balls: "+game.balls+"<br>"+
    game.result;
}

/* LOOP */
function loop(){

    draw();
    update();
    drawBall();
    hud();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
