<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }

#hud{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:Arial;
    font-size:22px;
    text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<div id="hud">
REAL BASEBALL FIELD (FINAL ALIGNMENT PASS)
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// CAMERA
const camera = new THREE.PerspectiveCamera(
65,
window.innerWidth/window.innerHeight,
0.1,
500
);

camera.position.set(0,8,24);
camera.lookAt(0,3,-25);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.75));

const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(20,50,20);
scene.add(sun);

// =====================
// GRASS (OUTFIELD BASE)
// =====================
const grass = new THREE.Mesh(
new THREE.PlaneGeometry(220,220),
new THREE.MeshStandardMaterial({color:0x1f7a35})
);
grass.rotation.x = -Math.PI/2;
scene.add(grass);

// =====================
// INFIELD DIRT (DIAMOND)
// =====================
const dirt = new THREE.Mesh(
new THREE.CircleGeometry(28,32),
new THREE.MeshStandardMaterial({color:0xb8753d})
);
dirt.rotation.x = -Math.PI/2;
dirt.position.set(0,0.03,-12);
scene.add(dirt);

// =====================
// BASES (REAL DIAMOND POSITIONS)
// =====================

// coordinates (clean diamond)
const HOME = {x:0, z:0};
const FIRST = {x:14, z:-14};
const SECOND = {x:0, z:-28};
const THIRD = {x:-14, z:-14};

// HOME PLATE
function homePlate(){
const shape = new THREE.Shape();
shape.moveTo(0,0);
shape.lineTo(1,0.5);
shape.lineTo(0.6,1.2);
shape.lineTo(-0.6,1.2);
shape.lineTo(-1,0.5);
shape.closePath();

const plate = new THREE.Mesh(
new THREE.ShapeGeometry(shape),
new THREE.MeshStandardMaterial({color:0xffffff})
);

plate.rotation.x = -Math.PI/2;
plate.position.set(HOME.x,0.08,HOME.z);
scene.add(plate);
}
homePlate();

// BASES
function base(x,z){
const b = new THREE.Mesh(
new THREE.BoxGeometry(1.4,0.1,1.4),
new THREE.MeshStandardMaterial({color:0xffffff})
);
b.position.set(x,0.08,z);
scene.add(b);
}

base(FIRST.x,FIRST.z);
base(SECOND.x,SECOND.z);
base(THIRD.x,THIRD.z);

// =====================
// BASEPATHS (NOW PROPERLY CONNECTED)
// =====================
function path(ax,az,bx,bz){
const dx = bx-ax;
const dz = bz-az;

const len = Math.sqrt(dx*dx + dz*dz);

const p = new THREE.Mesh(
new THREE.BoxGeometry(2.5,0.05,len),
new THREE.MeshStandardMaterial({color:0xb8753d})
);

p.position.set((ax+bx)/2,0.02,(az+bz)/2);
p.rotation.y = Math.atan2(dx,dz);

scene.add(p);
}

// connect all bases correctly
path(HOME.x,HOME.z,FIRST.x,FIRST.z);
path(FIRST.x,FIRST.z,SECOND.x,SECOND.z);
path(SECOND.x,SECOND.z,THIRD.x,THIRD.z);
path(THIRD.x,THIRD.z,HOME.x,HOME.z);

// =====================
// PITCHER MOUND (REAL LOCATION)
// =====================
const mound = new THREE.Mesh(
new THREE.CylinderGeometry(3.2,3.2,0.35,32),
new THREE.MeshStandardMaterial({color:0xb8753d})
);

// correct baseball distance (between home and 2nd)
mound.position.set(0,0.2,-18);
scene.add(mound);

// =====================
// FULL OUTFIELD WALL (LEFT + CENTER + RIGHT)
// =====================
const wallMat = new THREE.MeshStandardMaterial({color:0x1f4d2e});

// center
const centerWall = new THREE.Mesh(
new THREE.BoxGeometry(160,10,1),
wallMat
);
centerWall.position.set(0,5,-105);
scene.add(centerWall);

// left
const leftWall = new THREE.Mesh(
new THREE.BoxGeometry(1,10,140),
wallMat
);
leftWall.position.set(-80,5,-50);
scene.add(leftWall);

// right
const rightWall = new THREE.Mesh(
new THREE.BoxGeometry(1,10,140),
wallMat
);
rightWall.position.set(80,5,-50);
scene.add(rightWall);

// =====================
// BALL (TEST PITCH)
// =====================
const ball = new THREE.Mesh(
new THREE.SphereGeometry(0.25,16,16),
new THREE.MeshStandardMaterial({color:0xffffff})
);
scene.add(ball);

let z = -18;

// LOOP
function animate(){
requestAnimationFrame(animate);

z += 0.3;
if(z > 12) z = -18;

ball.position.set(0,3,z);

renderer.render(scene,camera);
}
animate();

// RESIZE
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
