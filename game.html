<!DOCTYPE html>
<html>

<head>

<title>Diamond Dynasty Baseball</title>

<style>

body{
    margin:0;
    overflow:hidden;
}

canvas{
    display:block;
}

#hud{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:Arial;
    font-size:22px;
    text-shadow:2px 2px 5px black;
}

</style>

</head>


<body>

<div id="hud">
DIAMOND DYNASTY BASEBALL<br>
REAL FIELD TEST
</div>


<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>


<script>


// ==========================
// SCENE
// ==========================

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x78c9ff);



// ==========================
// CAMERA
// ==========================

const camera =
new THREE.PerspectiveCamera(
65,
window.innerWidth/window.innerHeight,
0.1,
500
);


camera.position.set(
0,
4,
18
);


camera.lookAt(
0,
3,
-40
);



// ==========================
// RENDERER
// ==========================

const renderer =
new THREE.WebGLRenderer({
antialias:true
});


renderer.setSize(
window.innerWidth,
window.innerHeight
);


renderer.shadowMap.enabled=true;


document.body.appendChild(
renderer.domElement
);



// ==========================
// LIGHTS
// ==========================

scene.add(
new THREE.AmbientLight(
0xffffff,
0.7
));


const sun =
new THREE.DirectionalLight(
0xffffff,
2
);


sun.position.set(
20,
50,
20
);


scene.add(sun);



// ==========================
// FIELD
// ==========================


// Grass

const grass =
new THREE.Mesh(

new THREE.CircleGeometry(
90,
100
),

new THREE.MeshStandardMaterial({
color:0x238b45
})

);


grass.rotation.x=-Math.PI/2;

grass.position.z=-45;

scene.add(grass);



// Dirt diamond

const shape =
new THREE.Shape();


shape.moveTo(0,0);
shape.lineTo(18,-18);
shape.lineTo(0,-36);
shape.lineTo(-18,-18);
shape.closePath();



const dirt =
new THREE.Mesh(

new THREE.ShapeGeometry(
shape
),

new THREE.MeshStandardMaterial({
color:0xb8753d
})

);


dirt.rotation.x=-Math.PI/2;

dirt.position.y=.02;


scene.add(dirt);



// Base paths

const paths =
new THREE.Mesh(

new THREE.PlaneGeometry(
42,
42
),

new THREE.MeshStandardMaterial({
color:0xb8753d
})

);


paths.rotation.x=-Math.PI/2;

paths.rotation.z=Math.PI/4;

paths.position.y=.01;


scene.add(paths);



// ==========================
// BASES
// ==========================


function createBase(x,z){

let base =
new THREE.Mesh(

new THREE.BoxGeometry(
1.2,
0.1,
1.2
),

new THREE.MeshStandardMaterial({
color:white
})

);


base.position.set(
x,
.1,
z
);


scene.add(base);

}



createBase(0,0);
createBase(18,-18);
createBase(0,-36);
createBase(-18,-18);



// ==========================
// PITCHER MOUND
// ==========================


const mound =
new THREE.Mesh(

new THREE.CylinderGeometry(
3,
3,
0.35,
40
),

new THREE.MeshStandardMaterial({
color:0xb8753d
})

);


mound.position.set(
0,
.17,
-30
);


scene.add(mound);



// ==========================
// WALL
// ==========================


const wall =
new THREE.Mesh(

new THREE.TorusGeometry(
75,
0.7,
10,
120
),

new THREE.MeshStandardMaterial({
color:0x222222
})

);


wall.rotation.x=Math.PI/2;

wall.position.set(
0,
3,
-55
);


scene.add(wall);



// ==========================
// BALL
// ==========================


const ball =
new THREE.Mesh(

new THREE.SphereGeometry(
0.25,
20,
20
),

new THREE.MeshStandardMaterial({
color:0xffffff
})

);


scene.add(ball);


let pitch=0;



// ==========================
// LOOP
// ==========================

function animate(){

requestAnimationFrame(
animate
);


pitch+=0.02;


if(pitch>1){
pitch=0;
}


ball.position.set(
0,
2.5,
-30+(pitch*40)
);



renderer.render(
scene,
camera
);


}


animate();



// ==========================
// RESIZE
// ==========================

window.addEventListener(
"resize",
()=>{

camera.aspect=
window.innerWidth/window.innerHeight;


camera.updateProjectionMatrix();


renderer.setSize(
window.innerWidth,
window.innerHeight
);

});


</script>

</body>

</html>
