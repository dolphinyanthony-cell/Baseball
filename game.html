<!DOCTYPE html>
<html>

<head>
<title>Game</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

/* FULLSCREEN CANVAS */
canvas{
    display:block;
    width:100vw;
    height:100vh;
    background:linear-gradient(#2a7a45,#0b2b18);
}

/* HUD */
#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-size:18px;
    text-shadow:0 2px 8px rgba(0,0,0,0.7);
}

/* FULLSCREEN BUTTON */
#fs{
    position:absolute;
    bottom:20px;
    right:20px;
    padding:10px 14px;
    font-size:14px;
    background:rgba(0,0,0,0.6);
    color:white;
    border:none;
    cursor:pointer;
}

</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="hud"></div>
<button id="fs">Fullscreen</button>

<script>

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

/* Resize for fullscreen */
function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* Teams */
let homeTeam=localStorage.getItem("homeTeam");
let awayTeam=localStorage.getItem("awayTeam");

/* Game state */
let game={
    homeScore:0,
    awayScore:0,
    strikes:0,
    balls:0,
    result:"PLAY BALL"
};

/* Ball (3D illusion via scale + Y depth) */
let ball={
    x:0,
    y:0,
    z:0,
    speed:0.012,
    active:true
};

let plateY;

/* Fullscreen */
document.getElementById("fs").onclick=()=>{
    document.documentElement.requestFullscreen();
};

/* Pitch reset */
function pitch(){
    ball.x=0;
    ball.y=0;
    ball.z=0;
    ball.speed=0.010+Math.random()*0.006;
    ball.active=true;
}

pitch();

/* Swing */
document.addEventListener("keydown",(e)=>{
    if(e.code==="Space") swing();
});

function swing(){

    if(!ball.active) return;

    let timing=Math.abs(ball.z-0.82);

    if(timing<0.05){
        game.homeScore++;
        game.result="SOLID HIT";
    }
    else if(timing<0.12){
        game.result="CONTACT";
    }
    else{
        game.strikes++;
        game.result="MISS";
    }

    ball.active=false;
    setTimeout(pitch,700);
}

/* Update */
function update(){

    plateY=canvas.height*0.72;

    if(ball.active){
        ball.z+=ball.speed;

        if(ball.z>1){
            game.balls++;
            game.result="BALL";
            ball.active=false;
            setTimeout(pitch,600);
        }
    }
}

/* FIELD (BATTER POV PERSPECTIVE) */
function drawField(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // sky
    let sky=ctx.createLinearGradient(0,0,0,canvas.height);
    sky.addColorStop(0,"#1e6fa1");
    sky.addColorStop(1,"#0a2416");

    ctx.fillStyle=sky;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // infield perspective shape
    ctx.fillStyle="#c2a36b";

    ctx.beginPath();
    ctx.moveTo(canvas.width/2,canvas.height);
    ctx.lineTo(canvas.width*0.72,canvas.height*0.35);
    ctx.lineTo(canvas.width/2,canvas.height*0.2);
    ctx.lineTo(canvas.width*0.28,canvas.height*0.35);
    ctx.closePath();
    ctx.fill();

    // pitcher's mound (center focus)
    ctx.fillStyle="#b8945f";
    ctx.beginPath();
    ctx.arc(canvas.width/2,canvas.height*0.45,18,0,Math.PI*2);
    ctx.fill();

    // home plate
    ctx.fillStyle="white";
    ctx.fillRect(canvas.width/2-10,canvas.height*0.72,20,8);

    // strike zone
    ctx.strokeStyle="rgba(255,255,255,0.25)";
    ctx.strokeRect(canvas.width/2-60,canvas.height*0.55,120,140);
}

/* BALL DRAW (PERSPECTIVE) */
function drawBall(){

    if(!ball.active) return;

    let x=canvas.width/2;
    let y=canvas.height*0.2 + ball.z*(canvas.height*0.6);

    let size=3 + ball.z*14;

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fill();
}

/* UI */
function ui(){

    document.getElementById("hud").innerHTML=
    "<b>"+homeTeam+" vs "+awayTeam+"</b><br>"+
    "Score: "+game.homeScore+" - "+game.awayScore+"<br>"+
    "Strikes: "+game.strikes+" | Balls: "+game.balls+"<br>"+
    game.result;
}

/* LOOP */
function loop(){

    drawField();
    update();
    drawBall();
    ui();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
