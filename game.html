<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

canvas{
    display:block;
}

#hud{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:Arial;
    font-size:22px;
    text-shadow:2px 2px 5px black;
}
</style>

</head>

<body>

<div id="hud">
DIAMOND DYNASTY BASEBALL<br>
STADIUM BUILD
</div>


<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>


<script>


const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x75bfff);



const camera =
new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
500
);


camera.position.set(
0,
4,
15
);


camera.lookAt(
0,
3,
-40
);



const renderer =
new THREE.WebGLRenderer({
antialias:true
});


renderer.setSize(
window.innerWidth,
window.innerHeight
);


document.body.appendChild(
renderer.domElement
);



// LIGHT

scene.add(
new THREE.AmbientLight(
0xffffff,
0.7
));


let sun =
new THREE.DirectionalLight(
0xffffff,
2
);


sun.position.set(
20,
40,
20
);


scene.add(sun);



// FIELD

let field =
new THREE.Mesh(

new THREE.PlaneGeometry(
140,
140
),

new THREE.MeshStandardMaterial({
color:0x228b22
})

);


field.rotation.x=-Math.PI/2;

scene.add(field);



// INFIELD

let dirt =
new THREE.Mesh(

new THREE.CircleGeometry(
18,
32
),

new THREE.MeshStandardMaterial({
color:0xb77b45
})

);


dirt.rotation.x=-Math.PI/2;

dirt.position.y=.02;

scene.add(dirt);



// BASES

function addBase(x,z){

let b =
new THREE.Mesh(

new THREE.BoxGeometry(
1,
0.1,
1
),

new THREE.MeshStandardMaterial({
color:0xffffff
})

);


b.position.set(
x,
.1,
z
);


scene.add(b);

}


addBase(0,0);
addBase(18,-18);
addBase(0,-36);
addBase(-18,-18);



// PLAYER MODEL

function player(color,x,z){

let group =
new THREE.Group();



let body =
new THREE.Mesh(

new THREE.CylinderGeometry(
.5,
.6,
1.5,
16
),

new THREE.MeshStandardMaterial({
color:color
})

);


body.position.y=2;

group.add(body);



let head =
new THREE.Mesh(

new THREE.SphereGeometry(
.35,
16,
16
),

new THREE.MeshStandardMaterial({
color:0xffc79c
})

);


head.position.y=3.1;

group.add(head);



group.position.set(
x,
0,
z
);


scene.add(group);


return group;

}



// BATTER

let batter =
player(
0x0055ff,
0,
7
);


// PITCHER

let pitcher =
player(
0xff0000,
0,
-30
);



// BAT

let bat =
new THREE.Mesh(

new THREE.CylinderGeometry(
.12,
.2,
3,
16
),

new THREE.MeshStandardMaterial({
color:0x8b4513
})

);


bat.rotation.z=Math.PI/2;

bat.position.set(
1,
2.4,
6
);


scene.add(bat);



// BALL

let ball =
new THREE.Mesh(

new THREE.SphereGeometry(
.25,
16,
16
),

new THREE.MeshStandardMaterial({
color:0xffffff
})

);


scene.add(ball);



let pitch=0;



function animate(){

requestAnimationFrame(
animate
);


pitch+=0.02;


if(pitch>1){
pitch=0;
}


ball.position.set(
0,
2.5,
-30+(pitch*38)
);


renderer.render(
scene,
camera
);


}


animate();



// RESIZE

window.addEventListener(
"resize",
()=>{

camera.aspect=
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();


renderer.setSize(
window.innerWidth,
window.innerHeight
);

});


</script>

</body>

</html>
