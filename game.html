<!DOCTYPE html>
<html>

<head>
<title>Game</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b2a18;
    overflow:hidden;
}

/* CANVAS LOOK */
canvas{
    display:block;
    margin:auto;
    background:linear-gradient(#1b5a33,#144626);
}

/* ===== BROADCAST SCOREBOARD (NEW MLB STYLE) ===== */
#scoreboard{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);

    color:white;
    font-size:18px;
    letter-spacing:2px;

    padding:10px 18px;
    border-radius:10px;

    background:rgba(0,0,0,0.65);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* TEAM STYLE */
.team{
    display:inline-block;
    margin:0 20px;
    font-weight:bold;
    color:#f5e6b3;
}

/* COUNT DISPLAY */
#count{
    position:absolute;
    left:20px;
    top:15px;
    color:white;
    font-size:16px;
    opacity:0.9;
}

/* HINT */
#hint{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:#ddd;
    font-size:15px;
    opacity:0.7;
}

</style>
</head>

<body>

<div id="scoreboard">
    <span class="team" id="home"></span>
    <span id="score">0 - 0</span>
    <span class="team" id="away"></span>
</div>

<div id="count"></div>

<div id="hint">SPACE = Swing | Time your hit at the plate</div>

<canvas id="c" width="900" height="500"></canvas>

<script>

let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");

let homeTeam=localStorage.getItem("homeTeam");
let awayTeam=localStorage.getItem("awayTeam");

/* ===== GAME STATE ===== */
let game={
    homeScore:0,
    awayScore:0,
    strikes:0,
    balls:0,
    result:"PLAY BALL"
};

/* ===== BALL ===== */
let ball={
    x:450,
    y:80,
    speed:3.5,
    active:true
};

const plateY=380;

/* ===== UI ===== */
document.getElementById("home").innerText=homeTeam;
document.getElementById("away").innerText=awayTeam;

/* ===== PITCH ===== */
function resetPitch(){
    ball.x=450;
    ball.y=80;
    ball.speed=3+Math.random()*2;
    ball.active=true;
}

resetPitch();

/* ===== SWING ===== */
function swing(){

    if(!ball.active) return;

    let dist=Math.abs(ball.y-plateY);

    if(dist<18){
        game.homeScore++;
        game.result="HIT";
    }
    else if(dist<40){
        game.homeScore+=0.5;
        game.result="CONTACT";
    }
    else{
        game.strikes++;
        game.result="MISS";
    }

    ball.active=false;
    setTimeout(resetPitch,600);

    check();
}

/* ===== COUNT SYSTEM ===== */
function check(){

    if(game.strikes>=3){
        game.strikes=0;
        game.balls=0;
        game.result="OUT";
        setTimeout(resetPitch,800);
    }

    if(game.balls>=4){
        game.homeScore++;
        game.strikes=0;
        game.balls=0;
        game.result="WALK";
        setTimeout(resetPitch,800);
    }
}

/* ===== UPDATE ===== */
function update(){

    if(ball.active){
        ball.y+=ball.speed;

        if(ball.y>450){
            game.balls++;
            ball.active=false;
            game.result="BALL";
            setTimeout(resetPitch,600);
            check();
        }
    }
}

/* ===== DRAW FIELD (MORE MLB CAMERA FEEL) ===== */
function drawField(){

    ctx.clearRect(0,0,900,500);

    // grass gradient
    let g=ctx.createLinearGradient(0,0,0,500);
    g.addColorStop(0,"#1f6b3c");
    g.addColorStop(1,"#124022");

    ctx.fillStyle=g;
    ctx.fillRect(0,0,900,500);

    // infield
    ctx.fillStyle="#c2a36b";
    ctx.beginPath();
    ctx.moveTo(450,420);
    ctx.lineTo(610,260);
    ctx.lineTo(450,120);
    ctx.lineTo(290,260);
    ctx.closePath();
    ctx.fill();

    // plate
    ctx.fillStyle="white";
    ctx.fillRect(445,385,10,6);

    // STRIKE ZONE (MLB STYLE BOX)
    ctx.strokeStyle="rgba(255,255,255,0.25)";
    ctx.strokeRect(410,330,80,120);
}

/* ===== BALL ===== */
function drawBall(){

    if(!ball.active) return;

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,5,0,Math.PI*2);
    ctx.fill();
}

/* ===== INPUT ===== */
document.addEventListener("keydown",(e)=>{

    if(e.code==="Space"){
        swing();
    }

});

/* ===== UI ===== */
function ui(){

    document.getElementById("score").innerText=
    game.homeScore+" - "+game.awayScore;

    document.getElementById("count").innerText=
    "STRIKES: "+game.strikes+"  BALLS: "+game.balls+"  "+game.result;
}

/* ===== LOOP ===== */
function loop(){

    drawField();
    update();
    drawBall();
    ui();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
