<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-family:Arial;
    font-size:18px;
    text-shadow:0 2px 8px black;
}
</style>

</head>

<body>

<div id="hud">
DIAMOND DYNASTY BASEBALL<br>
3D FIELD TEST
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>


// ============================
// SCENE
// ============================

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x79bce8);


// ============================
// CAMERA
// ============================

const camera =
new THREE.PerspectiveCamera(
    65,
    window.innerWidth/window.innerHeight,
    0.1,
    500
);


// Batter perspective
camera.position.set(
    0,
    4,
    14
);

camera.lookAt(
    0,
    3,
    -45
);


// ============================
// RENDERER
// ============================

const renderer =
new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled=true;

document.body.appendChild(
    renderer.domElement
);


// ============================
// LIGHTS
// ============================

const sun =
new THREE.DirectionalLight(
    0xffffff,
    2
);

sun.position.set(
    20,
    50,
    20
);

sun.castShadow=true;

scene.add(sun);


scene.add(
new THREE.AmbientLight(
    0xffffff,
    .5
));


// ============================
// FIELD GRASS
// ============================

const grass =
new THREE.Mesh(

new THREE.PlaneGeometry(
    130,
    160
),

new THREE.MeshStandardMaterial({
    color:0x19752d
})

);


grass.rotation.x=-Math.PI/2;

scene.add(grass);


// ============================
// INFIELD DIRT
// ============================

const infield =
new THREE.Mesh(

new THREE.CircleGeometry(
    18,
    64
),

new THREE.MeshStandardMaterial({
    color:0xb98752
})

);

infield.rotation.x=-Math.PI/2;

infield.position.y=.02;

scene.add(infield);


// ============================
// BASE CREATOR
// ============================

function makeBase(x,z){

let base =
new THREE.Mesh(

new THREE.BoxGeometry(
    1,
    .08,
    1
),

new THREE.MeshStandardMaterial({
    color:0xffffff
})

);

base.position.set(
    x,
    .06,
    z
);

scene.add(base);

}


// Bases

makeBase(0,0);       // home
makeBase(18,-18);    // first
makeBase(0,-36);     // second
makeBase(-18,-18);   // third



// ============================
// PITCHER MOUND
// ============================

const mound =
new THREE.Mesh(

new THREE.CylinderGeometry(
    3,
    3,
    .3,
    32
),

new THREE.MeshStandardMaterial({
    color:0xb98752
})

);

mound.position.set(
    0,
    .15,
    -30
);

scene.add(mound);


// ============================
// FOUL LINES
// ============================

function createLine(x1,z1,x2,z2){

let points=[
new THREE.Vector3(x1,.05,z1),
new THREE.Vector3(x2,.05,z2)
];


let geometry =
new THREE.BufferGeometry()
.setFromPoints(points);


let material =
new THREE.LineBasicMaterial({
    color:0xffffff
});


let line =
new THREE.Line(
    geometry,
    material
);


scene.add(line);

}


createLine(
0,
0,
-65,
-65
);


createLine(
0,
0,
65,
-65
);


// ============================
// PLAYERS
// ============================

function createPlayer(color,x,z){

let player =
new THREE.Mesh(

new THREE.BoxGeometry(
1,
2,
1
),

new THREE.MeshStandardMaterial({
    color:color
})

);


player.position.set(
x,
1,
z
);


scene.add(player);

}


// Batter
createPlayer(
0x003cff,
0,
5
);


// Pitcher
createPlayer(
0xff0000,
0,
-30
);


// Fielders

createPlayer(
0xffffff,
-15,
-20
);

createPlayer(
0xffffff,
15,
-20
);

createPlayer(
0xffffff,
-35,
-45
);

createPlayer(
0xffffff,
0,
-60
);

createPlayer(
0xffffff,
35,
-45
);


// ============================
// BALL
// ============================

const ball =
new THREE.Mesh(

new THREE.SphereGeometry(
.25,
16,
16
),

new THREE.MeshStandardMaterial({
    color:white
})

);


scene.add(ball);



let ballZ=-30;


function resetBall(){

ballZ=-30;

}



// ============================
// ANIMATION
// ============================

function animate(){

requestAnimationFrame(
animate
);


// Pitch movement

ballZ+=.35;


if(ballZ>8){
    resetBall();
}


ball.position.set(
0,
3,
ballZ
);



renderer.render(
scene,
camera
);


}

animate();



// ============================
// RESIZE
// ============================

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();


renderer.setSize(
window.innerWidth,
window.innerHeight
);

});


</script>

</body>

</html>
