<!DOCTYPE html>
<html>

<head>
<title>Baseball Game</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    margin:auto;
    background:#1b5a33;
}

#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-family:Arial;
    font-size:16px;
    text-shadow:0 2px 8px rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="hud"></div>

<script>

let c=document.getElementById("c");
let ctx=c.getContext("2d");

function resize(){
    c.width=window.innerWidth;
    c.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* TEAMS */
let homeTeam=localStorage.getItem("homeTeam");
let awayTeam=localStorage.getItem("awayTeam");

/* BALL */
let ball={x:0,y:0,z:0,active:true,speed:0.012};

/* PLAYERS (simple positions) */
let players=[
    {x:0.5,y:0.72,type:"pitcher"},
    {x:0.5,y:0.78,type:"batter"},

    {x:0.35,y:0.55,type:"fielder"},
    {x:0.65,y:0.55,type:"fielder"},

    {x:0.2,y:0.3,type:"outfielder"},
    {x:0.5,y:0.25,type:"outfielder"},
    {x:0.8,y:0.3,type:"outfielder"}
];

function pitch(){
    ball.z=0;
    ball.active=true;
    ball.speed=0.01+Math.random()*0.005;
}
pitch();

/* SWING */
document.addEventListener("keydown",(e)=>{
    if(e.code==="Space"){
        let timing=Math.abs(ball.z-0.8);
        if(timing<0.06){
            ball.active=false;
        }
    }
});

/* UPDATE */
function update(){
    if(ball.active){
        ball.z+=ball.speed;
        if(ball.z>1){
            ball.active=false;
            setTimeout(pitch,700);
        }
    }
}

/* DRAW FIELD (REAL BASEBALL LAYOUT) */
function drawField(){

    ctx.clearRect(0,0,c.width,c.height);

    let w=c.width;
    let h=c.height;

    // sky
    let sky=ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0,"#1e6f9c");
    sky.addColorStop(1,"#0a2416");

    ctx.fillStyle=sky;
    ctx.fillRect(0,0,w,h);

    // outfield grass
    ctx.fillStyle="#1f6b3c";
    ctx.beginPath();
    ctx.moveTo(w/2,h);
    ctx.lineTo(w*0.95,h*0.35);
    ctx.lineTo(w*0.5,h*0.15);
    ctx.lineTo(w*0.05,h*0.35);
    ctx.closePath();
    ctx.fill();

    // dirt infield
    ctx.fillStyle="#c2a36b";
    ctx.beginPath();
    ctx.moveTo(w/2,h);
    ctx.lineTo(w*0.7,h*0.55);
    ctx.lineTo(w/2,h*0.35);
    ctx.lineTo(w*0.3,h*0.55);
    ctx.closePath();
    ctx.fill();

    // foul lines
    ctx.strokeStyle="white";
    ctx.beginPath();
    ctx.moveTo(w/2,h);
    ctx.lineTo(w*0.05,h*0.35);
    ctx.moveTo(w/2,h);
    ctx.lineTo(w*0.95,h*0.35);
    ctx.stroke();

    // players
    players.forEach(p=>{
        ctx.fillStyle=
        p.type==="pitcher"?"red":
        p.type==="batter"?"blue":"white";

        ctx.beginPath();
        ctx.arc(p.x*w,p.y*h,6,0,Math.PI*2);
        ctx.fill();
    });

    // ball
    if(ball.active){
        let x=w/2;
        let y=h*0.2 + ball.z*(h*0.6);

        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(x,y,5,0,Math.PI*2);
        ctx.fill();
    }
}

/* LOOP */
function loop(){
    drawField();
    update();

    document.getElementById("hud").innerHTML=
    homeTeam+" vs "+awayTeam+" | STADIUM BASE";

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
