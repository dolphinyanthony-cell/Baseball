<!DOCTYPE html>
<html>

<head>
<title>Diamond Dynasty Baseball</title>

<style>
body{
    margin:0;
    overflow:hidden;
}
canvas{ display:block; }

#hud{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:Arial;
    font-size:22px;
    text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<div id="hud">
DIAMOND DYNASTY BASEBALL<br>
REAL BASEBALL FIELD
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// CAMERA (batter view style)
const camera = new THREE.PerspectiveCamera(
65,
window.innerWidth/window.innerHeight,
0.1,
500
);

camera.position.set(0,6,18);
camera.lookAt(0,3,-45);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff,0.7));

const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(20,50,20);
scene.add(sun);

// =====================
// FIELD (REAL BASEBALL DIAMOND SCALE)
// =====================

// grass
const grass = new THREE.Mesh(
new THREE.PlaneGeometry(160,160),
new THREE.MeshStandardMaterial({color:0x228b45})
);
grass.rotation.x = -Math.PI/2;
scene.add(grass);

// infield dirt (diamond shape feel)
const dirt = new THREE.Mesh(
new THREE.CircleGeometry(22,32),
new THREE.MeshStandardMaterial({color:0xb8753d})
);
dirt.rotation.x = -Math.PI/2;
dirt.position.y = 0.02;
scene.add(dirt);

// base paths
const paths = new THREE.Mesh(
new THREE.PlaneGeometry(55,55),
new THREE.MeshStandardMaterial({color:0xb8753d})
);
paths.rotation.x = -Math.PI/2;
paths.rotation.z = Math.PI/4;
paths.position.y = 0.01;
scene.add(paths);

// =====================
// HOME PLATE (PENTAGON)
// =====================
function makeHomePlate(){

const shape = new THREE.Shape();

shape.moveTo(0,0);
shape.lineTo(1,0.5);
shape.lineTo(0.6,1.2);
shape.lineTo(-0.6,1.2);
shape.lineTo(-1,0.5);
shape.closePath();

const plate = new THREE.Mesh(
new THREE.ShapeGeometry(shape),
new THREE.MeshStandardMaterial({color:0xffffff})
);

plate.rotation.x = -Math.PI/2;
plate.position.set(0,0.08,0);

scene.add(plate);

}
makeHomePlate();

// =====================
// BASES (REAL DIAMOND POSITIONS)
// =====================

// 1st, 2nd, 3rd base (90 ft style spacing scaled)
function makeBase(x,z){

const base = new THREE.Mesh(
new THREE.BoxGeometry(1.4,0.1,1.4),
new THREE.MeshStandardMaterial({color:0xffffff})
);

base.position.set(x,0.08,z);
scene.add(base);

}

// REAL DIAMOND LAYOUT (NOT SOFTBALL)
makeBase(14,-14);   // 1st base
makeBase(0,-28);    // 2nd base (center deep)
makeBase(-14,-14);  // 3rd base

// =====================
// PITCHER MOUND (correct center distance)
// =====================
const mound = new THREE.Mesh(
new THREE.CylinderGeometry(3.5,3.5,0.4,32),
new THREE.MeshStandardMaterial({color:0xb8753d})
);

mound.position.set(0,0.2,-18);
scene.add(mound);

// =====================
// FULL OUTFIELD WALL (LEFT + CENTER + RIGHT)
// =====================

const wallMat = new THREE.MeshStandardMaterial({color:0x1f4d2e});

// center wall
const centerWall = new THREE.Mesh(
new THREE.BoxGeometry(140,10,1),
wallMat
);
centerWall.position.set(0,5,-75);
scene.add(centerWall);

// left wall
const leftWall = new THREE.Mesh(
new THREE.BoxGeometry(1,10,100),
wallMat
);
leftWall.position.set(-70,5,-25);
scene.add(leftWall);

// right wall
const rightWall = new THREE.Mesh(
new THREE.BoxGeometry(1,10,100),
wallMat
);
rightWall.position.set(70,5,-25);
scene.add(rightWall);

// =====================
// BALL (TEST PITCH)
// =====================
const ball = new THREE.Mesh(
new THREE.SphereGeometry(0.25,16,16),
new THREE.MeshStandardMaterial({color:0xffffff})
);

scene.add(ball);

let z = -18;

// LOOP
function animate(){
requestAnimationFrame(animate);

z += 0.35;
if(z > 10) z = -18;

ball.position.set(0,3,z);

renderer.render(scene,camera);
}
animate();

// RESIZE
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
