<!DOCTYPE html>
<html>

<head>

<title>Diamond Dynasty Baseball 3D</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    font-family:Arial;
    font-size:18px;
    text-shadow:0 2px 8px black;
}

</style>

</head>

<body>

<div id="hud">
DIAMOND DYNASTY BASEBALL<br>
READY
</div>


<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>


<script>


// ======================
// SETUP
// ======================

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x87ceeb);


const camera =
new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
500
);


const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);


// ======================
// LIGHT
// ======================

scene.add(
new THREE.AmbientLight(
0xffffff,
0.5
));


let sun =
new THREE.DirectionalLight(
0xffffff,
2
);

sun.position.set(
20,
40,
20
);

scene.add(sun);


// ======================
// FIELD
// ======================

let grass =
new THREE.Mesh(

new THREE.PlaneGeometry(
120,
120
),

new THREE.MeshStandardMaterial({
color:0x19752d
})

);


grass.rotation.x=-Math.PI/2;

scene.add(grass);


// Dirt

let dirt =
new THREE.Mesh(

new THREE.CircleGeometry(
20,
50
),

new THREE.MeshStandardMaterial({
color:0xb88952
})

);

dirt.rotation.x=-Math.PI/2;

dirt.position.y=.02;

scene.add(dirt);



// ======================
// PLAYER CREATOR
// ======================

function createPlayer(color,x,z){

let body =
new THREE.Mesh(

new THREE.CapsuleGeometry(
0.5,
1.5,
6,
10
),

new THREE.MeshStandardMaterial({
color:color
})

);

body.position.set(
x,
1.5,
z
);

scene.add(body);

return body;

}


// ======================
// BATTER
// ======================

let batter =
createPlayer(
0x0066ff,
0,
8
);


// BAT

let bat =
new THREE.Mesh(

new THREE.CylinderGeometry(
0.12,
0.12,
3,
16
),

new THREE.MeshStandardMaterial({
color:0x8b4513
})

);


bat.rotation.z=Math.PI/2;

bat.position.set(
1,
2,
7
);

scene.add(bat);



// ======================
// PITCHER
// ======================

let pitcher =
createPlayer(
0xff0000,
0,
-30
);



// ======================
// BALL
// ======================

let ball =
new THREE.Mesh(

new THREE.SphereGeometry(
0.25,
16,
16
),

new THREE.MeshStandardMaterial({
color:0xffffff
})

);

scene.add(ball);



let pitchAmount=0;

let throwing=false;

let swing=false;


// ======================
// PITCH
// ======================

function startPitch(){

pitchAmount=0;

throwing=true;

ball.position.set(
0,
2,
-30
);

}


startPitch();



// ======================
// SWING
// ======================

document.addEventListener(
"keydown",
function(e){

if(e.code==="Space"){

swing=true;

}

});



// ======================
// UPDATE
// ======================

function update(){

// pitcher motion

if(throwing){

pitchAmount+=0.02;


ball.position.z =
-30 + pitchAmount*38;


ball.position.y =
2 + Math.sin(pitchAmount*5)*0.5;



if(pitchAmount>=1){

throwing=false;

setTimeout(
startPitch,
1000
);

}


}


// bat swing

if(swing){

bat.rotation.y +=0.35;


let distance =
Math.abs(
ball.position.z-8
);


if(distance<1){

document.getElementById("hud").innerHTML=
"CONTACT!";

ball.position.y+=5;

}


if(bat.rotation.y>2){

bat.rotation.y=0;

swing=false;

}

}

}


// ======================
// CAMERA
// ======================

camera.position.set(
0,
5,
18
);


camera.lookAt(
0,
3,
-30
);


// ======================
// LOOP
// ======================

function animate(){

requestAnimationFrame(
animate
);


update();


renderer.render(
scene,
camera
);

}


animate();



// ======================
// RESIZE
// ======================

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});


</script>


</body>

</html>
